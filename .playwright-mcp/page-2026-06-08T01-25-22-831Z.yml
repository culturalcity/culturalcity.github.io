      - heading "這扇門平常怎麼運作" [level=1] [ref=e58]
      - paragraph [ref=e59]: 正常的連動有先後順序：收到下降訊號後，先讓小門的電磁鎖斷電、小門歸位關上；約 30 秒後，捲門才沿兩側軌道緩緩降下。小門先關、門面才完整，捲門才能平整下滑。
      - heading "兩個還沒解開的問題" [level=1] [ref=e60]
      - list [ref=e61]:
        - listitem [ref=e62]: 沒有火警，捲門為什麼會被觸發降下？被什麼觸發的？
        - listitem [ref=e63]: 就算被觸發了，為什麼小門的電磁鎖沒有斷電、小門沒關上？小門全程開著，捲門降下時門面不完整、受側向力，門片才會脫軌外凸。
      - heading "目前的判斷（待週一三方釐清：管委會・元群・太古華電）" [level=1] [ref=e64]
      - list [ref=e65]:
        - listitem [ref=e66]: 正規的連動序列本身是好的：5/7 師傅在控制盤上測試 2-3 次，都是小門正常關、捲門才緩降。所以問題不在這條路徑本身。
        - listitem [ref=e67]: 兩次現象完全一樣（捲門降、小門開），比較像固定的線路或邏輯問題，不像隨機故障。
        - listitem [ref=e68]: 最可能的方向：讓捲門下降的訊號，走了一條「不會去釋放小門」的路徑（線路或控制邏輯），或負責釋放小門的元件故障。需元群與太古華電現場一起會診確認。
        - listitem [ref=e69]:
          - text: 門片為何歪得這麼嚴重，另有一說（潤泰營造）：門體偏長，降到底觸地後仍續放，導致下半部堆疊屈曲。是否「減一兩片門片」須由元群以
          - strong [ref=e70]: 「不影響防火功能、能通過消防查驗」
          - text: 為前提評估，採不採行由管委會決定。
      - heading "待辦行動" [level=1] [ref=e71]
      - heading "一、會議前準備（6/8 週一中午前完成・總幹事）" [level=2] [ref=e72]
      - list [ref=e73]:
        - listitem [ref=e74]:
          - text: □
          - strong [ref=e75]: 採購應急工具
          - text: ：大號榔頭 ×1、長撬棒 ×1；固定放警衛室、貼標示、列入交接清單。萬一再發、廠商無法即時到場時可暫時自力敲回門片。
        - listitem [ref=e76]:
          - text: □
          - strong [ref=e77]: 建立 24 小時維修備援名單（不要只靠一家）
          - text: ：
          - list [ref=e78]:
            - listitem [ref=e79]: 第一家「一又又鐵捲門行」加進管理中心 Line（聯絡過的七、八家中唯一願假日／夜間出勤者）。
            - listitem [ref=e80]: 再多找 2-3 家可假日／夜間到場的鐵捲門廠商備援，避免哪天連這家也派不出人。
            - listitem [ref=e81]: 每家記錄聯絡人、電話、報價方式、是否確實 24 小時到場。
            - listitem [ref=e82]: 元群假日／夜間不出勤、加價也不接，緊急應變不再把元群算進去。
        - listitem [ref=e83]:
          - text: □
          - strong [ref=e84]: 加裝臨時監視器
          - text: ：在停車場內側、朝出入口方向架一支電池或 WiFi 監視器。要從防火門內側往外照，避開外側鏡頭被快速捲門擋住的老問題。目的是把下次發生當下的影像錄下來——這兩次都因沒影像而查不出原因。
          - list [ref=e85]:
            - listitem [ref=e86]: 聯絡弱電廠商詮越科技，評估加裝監視器方案（包括臨時或永久），確認鏡頭位置、佈線可行性與報價。
      - heading "二、週一三方會診（6/8・管委會主持，元群＋太古華電到場）" [level=2] [ref=e87]
      - list [ref=e88]:
        - listitem [ref=e89]:
          - text: □
          - strong [ref=e90]: 約齊兩家廠商到場、確認時間
          - text: （管委會主持，總幹事負責聯繫安排）：
          - list [ref=e91]:
            - listitem [ref=e92]: 元群建材（捲門原廠）——確認週一派得出人、到場時間。
            - listitem [ref=e93]: 太古華電（機電暨消防保養，同一家一肩挑兩個角色）——同樣由總幹事聯繫、約定到場時間。
            - listitem [ref=e94]: 兩家時間要對得上、各家都有人到，避免到場才發現缺一方、白跑一趟。
        - listitem [ref=e95]:
          - text: □
          - strong [ref=e96]: 會前向太古華電（消防保養端）調出火警總機紀錄
          - text: ：5/7、6/5 兩個時間點有無任何動作或故障記錄（「完全沒記錄」本身也是線索）。
        - listitem [ref=e97]:
          - text: □
          - strong [ref=e98]: 會議現場協助記錄，並請廠商當場處理
          - text: ：
          - list [ref=e99]:
            - listitem [ref=e100]: 量測捲門自動下降裝置的蓄電池電壓、檢查控制盤有無異常痕跡。
            - listitem [ref=e101]: 釐清：除了正常連動，還有哪條路徑會讓捲門降下卻不釋放小門。
            - listitem [ref=e102]: 詢問太古華電：近一、兩個月有無動過相關線路、停過電或做過測試。
      - heading "三、會議後持續追蹤" [level=2] [ref=e103]
      - list [ref=e104]:
        - listitem [ref=e105]:
          - text: □
          - strong [ref=e106]: 教警衛事件通報步驟
          - text: ：發現鐵捲門異常降下時——(1) 立即拍照、記下時間；(2) 通報主委；(3) 直接聯絡 24 小時廠商，不要等到上班日。
        - listitem [ref=e107]:
          - text: □
          - strong [ref=e108]: 依詮越科技評估結果，決定永久監視器方案
          - text: （正式佈線、取代臨時機）。
        - listitem [ref=e109]:
          - text: □
          - strong [ref=e110]: 待根本原因查明後
          - text: ，決定真正的解決方案與預防作法，並將定版案例折進《總幹事 Wiki》安全防災章節。
