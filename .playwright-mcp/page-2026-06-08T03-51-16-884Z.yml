    - main [ref=e34]:
      - heading "事件摘要" [level=1] [ref=e35]
      - paragraph [ref=e36]: 地下停車場出入口的防火鐵捲門，在沒有火警警報的情況下兩度自行降下，且降下時旁邊的逃生小門沒有關上，導致門片脫離側邊軌道、向外凸出彎曲，須由師傅以榔頭加撬棒人工敲回。已發生兩次（5/6、6/5），根本原因尚未查明，6/8（週一）由管委會召集原廠元群與太古華電（機電暨消防保養）到場會診。
      - paragraph [ref=e37]: 兩次都很幸運——5/6 在清晨、6/5 在中午，都當天排除。若發生在週末，元群假日無人，社區車輛進出恐癱瘓兩天。
