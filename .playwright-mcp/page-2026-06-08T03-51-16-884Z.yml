            - cell "2026/06/08" [ref=e61]
            - cell "太古華電會診前先到場勘查：發報箱觸發時小門正常先關、捲門才降；並發現入口消防發報箱未與消防主機連動、為獨立線路" [ref=e62]
      - heading "這扇門平常怎麼運作" [level=1] [ref=e63]
      - paragraph [ref=e64]: 正常的連動有先後順序：收到下降訊號後，先讓小門的電磁鎖斷電、小門歸位關上；約 30 秒後，捲門才沿兩側軌道緩緩降下。小門先關、門面才完整，捲門才能平整下滑。
      - heading "兩個還沒解開的問題" [level=1] [ref=e65]
      - list [ref=e66]:
        - listitem [ref=e67]: 沒有火警，捲門為什麼會被觸發降下？被什麼觸發的？
        - listitem [ref=e68]: 就算被觸發了，為什麼小門的電磁鎖沒有斷電、小門沒關上？小門全程開著，捲門降下時門面不完整、受側向力，門片才會脫軌外凸。
      - heading "目前的判斷（待週一三方釐清：管委會・元群・太古華電）" [level=1] [ref=e69]
      - list [ref=e70]:
        - listitem [ref=e71]: 正規的連動序列本身是好的：5/6 師傅在控制盤上測試 2-3 次，都是小門正常關、捲門才緩降。所以問題不在這條路徑本身。
        - listitem [ref=e72]: 兩次現象完全一樣（捲門降、小門開），比較像固定的線路或邏輯問題，不像隨機故障。
        - listitem [ref=e73]: 最可能的方向：讓捲門下降的訊號，走了一條「不會去釋放小門」的路徑（線路或控制邏輯），或負責釋放小門的元件故障。需元群與太古華電現場一起會診確認。
        - listitem [ref=e74]:
          - text: 門片為何歪得這麼嚴重，另有一說（潤泰營造）：門體偏長，降到底觸地後仍續放，導致下半部堆疊屈曲。是否「減一兩片門片」須由元群以
          - strong [ref=e75]: 「不影響防火功能、能通過消防查驗」
          - text: 為前提評估，採不採行由管委會決定。
      - heading "太古華電現場初步發現（6/8）" [level=1] [ref=e76]
      - paragraph [ref=e77]: 太古華電（機電暨消防保養）於三方會診前先到場勘查，兩個關鍵發現：
      - list [ref=e78]:
        - listitem [ref=e79]:
          - text: 入口這顆消防發報箱
          - strong [ref=e80]: 動作正常
          - text: ：觸發時小門有先自動關上、捲門才下降（正常序列）。
        - listitem [ref=e81]:
          - text: 這顆發報箱
          - strong [ref=e82]: 並未與大樓消防主機連動，是獨立線路
          - text: ——在入口做開關測試時，消防主機完全沒響。
        - listitem [ref=e83]:
          - text: 因此
          - strong [ref=e84]: 消防主機查無 5/6、6/5 的相關紀錄
          - text: ：不是查不到，而是這條獨立線路的訊號根本傳不到主機。
      - paragraph [ref=e85]: 由此可得兩個推論：
      - list [ref=e86]:
        - listitem [ref=e87]:
          - strong [ref=e88]: 大樓消防主機與本事件無關
          - text: ——先前「主機查無紀錄」得到解釋（根本沒接），原本「主機誤送訊號」的假設可以排除。
        - listitem [ref=e89]:
          - strong [ref=e90]: 嫌疑更集中在元群的獨立自動下降裝置
          - text: ——元群之前在控制盤、太古今天用發報箱，兩種「乾淨觸發」小門都正常先關；可見兩次事故走的不是乾淨觸發，比較像
          - strong [ref=e91]: 這條獨立線路／自動下降裝置的間歇性電氣異常
          - text: ：啟動了下降，卻沒跑完小門釋放。可疑點為控制板、繼電器、感知器、蓄電池，都屬元群範疇。
      - paragraph [ref=e92]:
        - strong [ref=e93]: 另需釐清（消防面）
        - text: ：此防火捲門與消防主機未連動，是否符合防火區劃的連動要求？萬一真實火警由主機在他處偵測到，此門是否應一併自動關閉？請太古華電（消防端）說明是「設計本就獨立」或「應連動卻沒接」的缺口。這與誤降是兩件事，但既然發現了就一起追。
      - heading "待辦行動" [level=1] [ref=e94]
      - heading "一、會議前準備（6/8 週一中午前完成・總幹事）" [level=2] [ref=e95]
      - list [ref=e96]:
        - listitem [ref=e97]:
          - text: □
          - strong [ref=e98]: 採購應急工具
          - text: ：大號榔頭 ×1、長撬棒 ×1；固定放警衛室、貼標示、列入交接清單。萬一再發、廠商無法即時到場時可暫時自力敲回門片。
        - listitem [ref=e99]:
          - text: □
          - strong [ref=e100]: 建立 24 小時維修備援名單（不要只靠一家）
          - text: ：
          - list [ref=e101]:
            - listitem [ref=e102]: 第一家「一又又鐵捲門行」加進管理中心 Line（聯絡過的七、八家中唯一願假日／夜間出勤者）。
            - listitem [ref=e103]: 再多找 2-3 家可假日／夜間到場的鐵捲門廠商備援，避免哪天連這家也派不出人。
            - listitem [ref=e104]: 每家記錄聯絡人、電話、報價方式、是否確實 24 小時到場。
            - listitem [ref=e105]: 元群假日／夜間不出勤、加價也不接，緊急應變不再把元群算進去。
        - listitem [ref=e106]:
          - text: □
          - strong [ref=e107]: 加裝臨時監視器
          - text: ：在停車場內側、朝出入口方向架一支電池或 WiFi 監視器。要從防火門內側往外照，避開外側鏡頭被快速捲門擋住的老問題。目的是把下次發生當下的影像錄下來——這兩次都因沒影像而查不出原因。
          - list [ref=e108]:
            - listitem [ref=e109]: 聯絡弱電廠商詮越科技，評估加裝監視器方案（包括臨時或永久），確認鏡頭位置、佈線可行性與報價。
      - heading "二、週一三方會診（6/8・管委會主持，元群＋太古華電到場）" [level=2] [ref=e110]
      - list [ref=e111]:
        - listitem [ref=e112]:
          - text: □
          - strong [ref=e113]: 約齊兩家廠商到場、確認時間
          - text: （管委會主持，總幹事負責聯繫安排）：
          - list [ref=e114]:
            - listitem [ref=e115]: 元群建材（捲門原廠）——確認週一派得出人、到場時間。
            - listitem [ref=e116]: 太古華電（機電暨消防保養，同一家一肩挑兩個角色）——同樣由總幹事聯繫、約定到場時間。
            - listitem [ref=e117]: 兩家時間要對得上、各家都有人到，避免到場才發現缺一方、白跑一趟。
        - listitem [ref=e118]:
          - text: □
          - strong [ref=e119]: 會議現場協助記錄，並請元群當場處理
          - text: （焦點：6/8 太古已把消防主機排除，矛頭指向元群的獨立自動下降裝置）：
          - list [ref=e120]:
            - listitem [ref=e121]: 針對獨立自動下降裝置做間歇異常檢測：控制板、繼電器、延時模組、感知器、蓄電池電壓、受潮／接點氧化。
            - listitem [ref=e122]: 對元群提問：這套裝置在什麼電氣異常下會「啟動下降卻沒釋放小門」——這正是兩次事故的表現。
        - listitem [ref=e123]:
          - text: □
          - strong [ref=e124]: 消防面請太古釐清
          - text: ：此防火捲門與消防主機未連動，是設計如此或應連動卻沒接的缺口；是否影響防火區劃合規。
      - heading "三、會議後持續追蹤" [level=2] [ref=e125]
      - list [ref=e126]:
        - listitem [ref=e127]:
          - text: □
          - strong [ref=e128]: 教警衛事件通報步驟
          - text: ：發現鐵捲門異常降下時——(1) 立即拍照、記下時間；(2) 通報主委；(3) 直接聯絡 24 小時廠商，不要等到上班日。
        - listitem [ref=e129]:
          - text: □
          - strong [ref=e130]: 依詮越科技評估結果，決定永久監視器方案
          - text: （正式佈線、取代臨時機）。
        - listitem [ref=e131]:
          - text: □
          - strong [ref=e132]: 待根本原因查明後
          - text: ，決定真正的解決方案與預防作法，並將定版案例折進《總幹事 Wiki》安全防災章節。
