          - text: ：11 月底（如 114/11/30 到期 → 115/12/01 起算下一個兩年）
        - listitem [ref=e869]:
          - strong [ref=e870]: 歷年單價
          - text: ：113 年起每月 $12,870；115 年議價後維持原價續約 2 年至 117/11
        - listitem [ref=e871]:
          - strong [ref=e872]: 議價原則
          - text: ：
          - list [ref=e873]:
            - listitem [ref=e874]: 廠商通常會嘗試小幅調漲（如 $12,870 → $13,100，漲 $230）
            - listitem [ref=e875]:
