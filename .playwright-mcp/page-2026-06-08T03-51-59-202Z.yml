          - text: ：合約到期前 2 個月由總幹事啟動議價，避免年底匆忙。詳見本章 §3 廠商管理與招標。
        - listitem [ref=e858]:
          - strong [ref=e859]: 延伸
          - text: ：機電廠商有時會額外提報修繕／改善案（如緊急發電機保養、外掛式充電器增設），需由管委會單獨議決，不可預設併入年度合約。
      - heading "1.2 電梯保養" [level=3] [ref=e860]
      - list [ref=e861]:
        - listitem [ref=e862]:
          - strong [ref=e863]: 廠商
          - text: ：三菱電梯
        - listitem [ref=e864]:
          - strong [ref=e865]: 合約期
          - text: ：
          - strong [ref=e866]: 兩年期
