        - listitem [ref=e884]:
          - strong [ref=e885]: 策略
          - text: ：跳過冬季月份以節省預算。
        - listitem [ref=e886]:
          - strong [ref=e887]: 年度換約啟動點
          - text: ：合約到期前 2 個月由總幹事啟動議價。詳見本章 §3。
      - heading "1.4 電動大門" [level=3] [ref=e888]
      - list [ref=e889]:
        - listitem [ref=e890]:
          - strong [ref=e891]: 核心問題
          - text: ：本社區電動大門因門扇重量（單扇約 190-200 公斤）對電動馬達造成較大負擔，使其成為最脆弱、最不耐久的一環，因此需要定期的專業保養。
        - listitem [ref=e892]:
          - strong [ref=e893]: 市場特性
          - text: ：自動門馬達（鉸鏈）在雙北市場基本上為「多堡科技」與「美德亞」兩家代理商所寡佔，導致議價空間極小。
        - listitem [ref=e894]:
          - strong [ref=e895]: 決策過程
          - text: ：管委會曾深入探討多個方案，包括將大門改為較輕的手動門（備案）、增設玻璃小門以降低大門使用頻率等，但最終考量到大門使用的必要性與穩定性，決議仍維持現有電動大門並執行定期保養。
        - listitem [ref=e896]:
          - strong [ref=e897]: 廠商更替
          - text: ：大門馬達的保養廠商已由初期的「多堡」更換為後來的「美德亞」。
        - listitem [ref=e898]:
          - strong [ref=e899]: 現行保養合約與 SOP
          - text: ：
          - list [ref=e900]:
            - listitem [ref=e901]:
              - strong [ref=e902]: 決議方案
              - text: ：第二屆第十次管委會（2024/04/18）決議，接受「美德亞」的保養方案。
            - listitem [ref=e903]:
              - strong [ref=e904]: 合約內容
              - text: ：每三個月一次，每次 8,000 元（未稅）。
            - listitem [ref=e905]:
              - strong [ref=e906]: 保養項目
              - text: ：依 DORMA 原廠規定程序進行（檢視、清潔、防銹、潤滑、微調、校正、及教育住戶正確使用方式）。
            - listitem [ref=e907]:
              - strong [ref=e908]: 注意事項
              - text: ：保養涉及專業系統檢查，無法由社區人員自行執行。總幹事應定期安排時程並登錄至 Google 日曆。
        - listitem [ref=e909]:
          - strong [ref=e910]: 長期議題與備援方案
          - text: （若未來需更換，需經區權會決議）：
          - list [ref=e911]:
            - listitem [ref=e912]:
              - strong [ref=e913]: 備案一（輕量化手動大門）
              - text: ：由「金耀」廠商設計，重量降至 150KG，預算約 35.88 萬元（不含泥作）。
            - listitem [ref=e914]:
              - strong [ref=e915]: 備案二（增設玻璃小門）
              - text: ：由「金耀」設計，將小門寬度由 60cm 增加至 72cm，預算約 12.45 萬元。
            - listitem [ref=e916]:
              - strong [ref=e917]: 委員會共識
              - text: ：任何「換門」決策必經區權會同意。
      - heading "1.5 水塔清洗" [level=3] [ref=e918]
      - list [ref=e919]:
        - listitem [ref=e920]:
          - strong [ref=e921]: 技術特性
          - text: ：頂樓為「單一進出水閥」相通設計，清洗時必定需要停水。
        - listitem [ref=e922]:
          - strong [ref=e923]: 地下室水箱定水位閥問題
          - text: ：
          - list [ref=e924]:
            - listitem [ref=e925]:
              - strong [ref=e926]: B2 水箱
              - text: ：已於 2025/07 更換（社區第四年）。
            - listitem [ref=e927]:
              - strong [ref=e928]: B4 水箱
              - text: ：於 2025 年間發現水流較小，但尚足補充用水，暫不更換。
        - listitem [ref=e929]:
