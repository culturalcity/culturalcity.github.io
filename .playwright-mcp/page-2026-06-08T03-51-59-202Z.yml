        - text: ：每天發 1 張公告而已。
        - strong [ref=e840]: 長期看
        - text: ：4 年累積下來，是社區從未擁有過的真實水電歷史資料庫——
      - list [ref=e841]:
        - listitem [ref=e842]: 知道社區基準負載 ~190 度／日（不開冷氣最低耗電）
        - listitem [ref=e843]: 知道冷氣負載年化 ~18,500 度（19% 總用電）
        - listitem [ref=e844]: 知道公水自動澆灌排程過量 2-6 倍（vs 校準後的合理用量）
        - listitem [ref=e845]: 設備故障時可快速比對歷史 pattern 判斷原因
      - paragraph [ref=e846]:
        - strong [ref=e847]: 這份資料庫就是您每天 10 分鐘工作的最大產出
        - text: 。下任總幹事接手時，整套歷史可無縫延續判斷力。
