      - heading "第一章：核心管理哲學與職責定位" [level=1] [ref=e285]
      - heading "1. 目標與願景" [level=2] [ref=e286]
      - paragraph [ref=e287]: 本份 Wiki的編撰並非僅為了規範行政細節，而是為了達成以下戰略目標：
      - list [ref=e288]:
        - listitem [ref=e289]:
          - strong [ref=e290]: 願景
          - text: ：實現社區管理的連續性與一致性，不因人員更迭而中斷。
        - listitem [ref=e291]:
          - strong [ref=e292]: 核心轉變
          - text: ：將管理知識從依賴個人的「屬人」性質，轉變為歸屬於社區的「屬社區」資產。
        - listitem [ref=e293]:
          - strong [ref=e294]: 終極目的
          - text: ：保護並累積閱大安社區的「無形資產」（如：管理經驗、廠商關係、決策脈絡）。
      - heading "2. 核心策略與指導原則" [level=2] [ref=e295]
      - paragraph [ref=e296]: 為了落實上述願景，總幹事在執行日常勤務時，應遵循以下四大指導原則：
      - heading "2.1 數位化優先" [level=3] [ref=e297]
      - paragraph [ref=e298]: 社區自第一屆管委會起便確立「無紙化辦公」的傳統。總幹事應熟練運用雲端協作工具（如 Google Workspace, Notion），擺脫傳統紙本作業模式，確保資料能即時同步與備份。
      - heading "2.2 成本效益意識" [level=3] [ref=e299]
      - paragraph [ref=e300]: 總幹事應具備主動為社區「省錢」與「創造價值」的意識。
      - list [ref=e301]:
        - listitem [ref=e302]: 善用電商平台進行比價與採購。
        - listitem [ref=e303]: 為社區尋求最具經濟效益的解決方案，而非僅依賴廠商報價。
      - heading "2.3 視覺形象一致性" [level=3] [ref=e304]
      - paragraph [ref=e305]:
        - text: 為維護社區整體的專業形象與品牌質感，
        - strong [ref=e306]: 嚴禁使用任何自製、非官方設計的標語或公告
        - text: （如手寫、Word 簡易排版）。
      - list [ref=e307]:
        - listitem [ref=e308]: 社區已建立一套完整的視覺識別系統 (VIS)。
        - listitem [ref=e309]:
          - strong [ref=e310]: 執行要點
          - text: ：所有公告請直接取用
          - strong [ref=e311]: Google Drive 資料庫中的「官方設計範本」
          - text: 進行文字替換，杜絕「土法煉鋼」式的管理痕跡。
      - heading "2.4 自立自強原則" [level=3] [ref=e312]
      - paragraph [ref=e313]: 無論進駐的物業管理公司品牌為何，社區的實際管理品質，最終取決於「管委會的投入」與「駐點總幹事的專業責任心」。我們應將物業公司視為合作資源，而非過度依賴其總部的標準化流程，必須建立屬於閱大安自己的管理靈魂。
      - heading "3. 角色定位與職責界定" [level=2] [ref=e314]
      - heading "3.1 角色分工" [level=3] [ref=e315]
      - list [ref=e316]:
        - listitem [ref=e317]:
          - strong [ref=e318]: 管理委員會
          - text: ：制度建立者（制定遊戲規則與決策）。
        - listitem [ref=e319]:
          - strong [ref=e320]: 物業公司/總幹事
          - text: ：專業執行者（落實決策並提供專業建議）。
      - heading "3.2 總幹事職責界定" [level=3] [ref=e321]
      - paragraph [ref=e322]: 為了讓總幹事能專注於高價值的管理工作，我們明確區分核心與非核心職責：
      - list [ref=e323]:
        - listitem [ref=e324]:
          - strong [ref=e325]: 核心職責
          - text: ：
          - list [ref=e326]:
            - listitem [ref=e327]: 專業管理顧問。
            - listitem [ref=e328]: 廠商協調與談判。
            - listitem [ref=e329]: 行政與財務作業。
            - listitem [ref=e330]: 數位系統操作與維護。
            - listitem [ref=e331]: 確實執行管委會決議。
        - listitem [ref=e332]:
          - strong [ref=e333]: 非核心職責（釐清期待）
          - text: ：
          - list [ref=e334]:
            - listitem [ref=e335]:
              - strong [ref=e336]: 範疇
              - text: ：如更換燈管、簡易修繕等勞務工作。
            - listitem [ref=e337]:
              - strong [ref=e338]: 原則
              - text: ：此類工作屬於總幹事在
              - strong [ref=e339]: 「不影響核心勤務」且「確保自身安全」前提下
              - text: ，願意提供的額外協助，
              - strong [ref=e340]: 但不應被視為理所當然的份內之事
              - text: 。責任劃分需清晰，避免因瑣事癱瘓核心管理機能。
      - heading "4. 具體執行辦法" [level=2] [ref=e341]
      - paragraph [ref=e342]: 為落實管理哲學，我們將透過以下具體手段執行：
      - list [ref=e343]:
        - listitem [ref=e344]:
          - strong [ref=e345]: 文件標準化
          - text: ：統一所有公告、財報、會議記錄的格式。
        - listitem [ref=e346]:
          - strong [ref=e347]: 流程制度化
          - text: ：將複雜的任務拆解為標準作業程序。
        - listitem [ref=e348]:
          - strong [ref=e349]: 建立社區知識庫
          - text: ：利用 Notion 建構可搜尋、可積累的知識中心。
        - listitem [ref=e350]:
          - strong [ref=e351]: 管委會主導的職前訓練
          - text: ：由管委會親自對新任總幹事進行導讀與訓練，以
          - strong [ref=e352]: 彌補物業公司職前訓練不足的產業缺口
          - text: ，並確保其理解社區文化。
