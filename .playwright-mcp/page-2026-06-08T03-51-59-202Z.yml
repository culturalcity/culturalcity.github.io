          - text: ：第四屆管委會例會固定於
          - strong [ref=e423]: 每月第二個星期一 20:00
          - text: 。
        - listitem [ref=e424]:
          - strong [ref=e425]: 維護排程
          - text: ：每月初需主動向廠商（機電、電梯、園藝、水塔、消毒、高壓清洗、修繕等）確認當月保養日期，並登錄至日曆。
