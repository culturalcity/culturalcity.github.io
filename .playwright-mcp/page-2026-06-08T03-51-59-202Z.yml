      - heading "8.3 備註欄使用原則（重要）" [level=3] [ref=e795]
      - paragraph [ref=e796]:
        - text: 備註欄不是裝飾——是
        - strong [ref=e797]: 社區用水/用電歷史資料庫的關鍵欄位
        - text: ，每筆事件都會成為未來判斷異常的依據。請務必當天填寫，事後補登記憶會模糊。
      - paragraph [ref=e798]:
        - strong [ref=e799]: 該填的事件類型
        - text: ：
      - list [ref=e800]:
        - listitem [ref=e801]:
          - strong [ref=e802]: 設備異常或故障
          - text: ：揚水馬達、抽水泵、空壓機、冷氣等運作異常
        - listitem [ref=e803]:
          - strong [ref=e804]: 設備維修或更換
          - text: ：哪天請哪家廠商來修什麼
        - listitem [ref=e805]:
          - strong [ref=e806]: 計水/計電中斷
          - text: ：智慧電錶或水管家系統當機、抄表延遲
        - listitem [ref=e807]:
          - strong [ref=e808]: 特殊用水/用電場景
          - text: ：水塔清洗、外牆清洗、高壓沖洗、大型活動
        - listitem [ref=e809]:
          - strong [ref=e810]: 施工
          - text: ：住戶裝修、社區工程、廠商進場
        - listitem [ref=e811]:
          - strong [ref=e812]: 異常天氣
          - text: ：颱風前後、寒流、熱浪
      - paragraph [ref=e813]:
        - strong [ref=e814]: 為什麼這件事重要
        - text: ：2026 年 4 月曾發生揚水馬達軟管破裂、3 天用電飆到 540 度（vs 平日 200 度）。
        - strong [ref=e815]: 因為當時備註欄有記
        - text: ，事後查資料時才能快速判斷「這 3 天是設備故障、不是熱浪」，避免污染整個迴歸模型。詳見第四章 §3.1.3。
