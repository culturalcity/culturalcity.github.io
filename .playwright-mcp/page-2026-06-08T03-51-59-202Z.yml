    - main [ref=e127]:
      - heading "前言" [level=1] [ref=e128]
      - paragraph [ref=e129]: 歡迎您進駐閱大安社區擔任總幹事。本份 Wiki整理了社區的數位系統、設施保養、行政財務、安全防災、住戶關係等各面向的工作內容與標準作業流程，作為您到職訓練、日常工作與未來交接時的依據。
      - paragraph [ref=e130]:
        - text: 社區自第一屆管委會以來追求「
        - strong [ref=e131]: 屬社區的資產而非屬個人的習慣
        - text: 」——也就是不論誰擔任總幹事，社區的管理品質應該維持穩定、文件格式應該一致、廠商關係與住戶資料應該完整保存。本份 Wiki是這個理念的具體實踐，也希望您在工作中持續累積、優化內容，下任接手時能無縫接續。
      - separator [ref=e132]
      - paragraph [ref=e133]:
        - text: 在第一屆管委會任期內，我們經歷了極不穩定的管理震盪，具體表現為
        - strong [ref=e134]: 「四位總幹事、四種公告格式、四種財報格式、四種會議記錄格式」
        - text: 。這不僅是行政效率的耗損，更反映了深層的結構性問題。
      - document [ref=e136]:
        - generic [ref=e138]:
          - generic [ref=e152]: 重啟循環
          - generic [ref=e153]:
            - generic [ref=e158]: 物業公司先接案再找人
            - generic [ref=e163]: 總幹事無訓練直接空降
            - generic [ref=e168]: 依個人習慣作業
            - generic [ref=e173]: 格式混亂/資產流失
            - generic [ref=e178]: 管委會介入校正
            - generic [ref=e183]: 總幹事壓力大離職
            - generic [ref=e188]: 四個四現象
            - generic [ref=e193]: 四位總幹事
            - generic [ref=e198]: 四種公告格式
            - generic [ref=e203]: 四種財報格式
            - generic [ref=e208]: 四種會議記錄格式
      - paragraph [ref=e209]: 本章節將剖析造成此現象的成因與影響，並確立本份 Wiki存在的必要性。
      - heading "1. 系統性根源：產業結構的先天限制" [level=2] [ref=e210]
      - paragraph [ref=e211]: 整體物業產業目前面臨人才供不應求的結構性困境，導致一線人員素質參差不齊。
      - list [ref=e212]:
        - listitem [ref=e213]:
          - strong [ref=e214]: 物業管理公司未落實儲備訓練
          - text: ：
          - list [ref=e215]:
            - listitem [ref=e216]:
              - strong [ref=e217]: 成本考量
              - text: ：物業公司為控制營運成本，傾向「少養閒人」，不願在派駐前投入資源培訓儲備幹部。
            - listitem [ref=e218]:
              - strong [ref=e219]: 匹配性無法預期
              - text: ：總幹事的人格特質與未來派駐案場的工作地點、屬性是否匹配難以預料，降低了公司預先培訓的意願。
        - listitem [ref=e220]:
          - strong [ref=e221]: 「先接案，再找人」的惡性模式
          - text: ：
          - list [ref=e222]:
            - listitem [ref=e223]: 業界常態傾向於開發到新案場後，才開始在市場上緊急招募總幹事。
            - listitem [ref=e224]: 一旦招募成功，在完全沒有空檔進行職前教育訓練的情況下，即直接「空降」至案場，導致總幹事缺乏對社區文化的理解與標準化作業能力。
      - heading "2. 中間環節：管理斷層與經驗歸零" [level=2] [ref=e225]
      - list [ref=e226]:
        - listitem [ref=e227]:
          - strong [ref=e228]: 頻繁的人員異動導致「格式重置」
          - text: ：
          - list [ref=e229]:
            - listitem [ref=e230]: 高流動率使得每一次交接都像是一次「管理模式的重置」。
            - listitem [ref=e231]: 每位新任總幹事往往帶來個人的工作習慣與格式，而非延續社區既有的制度，造成行政風格無法統一。
      - heading "3. 具體衝擊：社區行政資產流失" [level=2] [ref=e232]
      - list [ref=e233]:
        - listitem [ref=e234]:
          - strong [ref=e235]: 知識與經驗無法累積
          - text: ：
          - list [ref=e236]:
            - listitem [ref=e237]: 由於缺乏統一標準，流程與檔案格式混亂。
            - listitem [ref=e238]: 社區的隱性資產（如過往決策邏輯、廠商應對細節、住戶特殊服務紀錄）無法有效沉澱，隨著人員離職而一併流失，導致管委會不斷在處理重複的問題。
      - heading "4. 最終困境：管委會職能錯置" [level=2] [ref=e239]
      - list [ref=e240]:
        - listitem [ref=e241]:
          - strong [ref=e242]: 監督者被迫成為執行者
          - text: ：
          - list [ref=e243]:
            - listitem [ref=e244]: 委員被迫花費大量時間糾正基本的行政格式、錯字與流程細節，而非專注於社區的重大決策與方向規劃。
            - listitem [ref=e245]: 難以建立長久且穩定的運作模式，導致社區管理品質始終在低檔徘徊，無法提升。
      - document [ref=e247]:
