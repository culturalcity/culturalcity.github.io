          - text: ：僅限管理中心發布重要公告（單向），避免社區公告被住戶的討論淹沒。
        - listitem [ref=e508]:
          - strong [ref=e509]: 住戶討論群組
          - text: ：住戶交流區，總幹事需適度關注但不介入非公務閒聊。
        - listitem [ref=e510]:
          - strong [ref=e511]: 管理委員會群組
          - text: ：核心決策圈。
        - listitem [ref=e512]:
          - strong [ref=e513]: 管委會+建設公司群組
          - text: ：涉及保固修繕議題使用。
      - heading "3.2 權限交接" [level=3] [ref=e514]
      - list [ref=e515]:
        - listitem [ref=e516]: 總幹事異動時，務必確認所有群組的管理權限已完整移轉給新任總幹事或主委。
      - heading "4. Notion 社區資料中心" [level=2] [ref=e517]
      - list [ref=e518]:
        - listitem [ref=e519]:
          - strong [ref=e520]: 啟用時間
          - text: ：2025 年 6 月建置。
        - listitem [ref=e521]:
          - strong [ref=e522]: 核心價值
          - text: ：
          - list [ref=e523]:
            - listitem [ref=e524]: 解決傳統 Office 檔案分散、難以交互參照的問題。
            - listitem [ref=e525]:
              - text: 包含
              - strong [ref=e526]: 12 個模組、32 張資料表
              - text: （如：住戶資料可直接連動管理費紀錄、廠商資料可連動維修紀錄）。
        - listitem [ref=e527]:
          - strong [ref=e528]: 操作與學習門檻
          - text: ：
          - list [ref=e529]:
            - listitem [ref=e530]:
              - text: 此系統功能強大，但對於習慣傳統文書作業的總幹事可能會有
              - strong [ref=e531]: 轉換陣痛期
              - text: 。
            - listitem [ref=e532]:
              - strong [ref=e533]: 心態建設
              - text: ：初期操作較慢是正常的，請務必參閱專屬教學章節，一旦上手，將大幅減少重複作業的時間。
      - heading "5. 智生活（社區管理APP）管理後台" [level=2] [ref=e534]
      - heading "5.1 核心功能操作" [level=3] [ref=e535]
      - list [ref=e536]:
        - listitem [ref=e537]:
          - strong [ref=e538]: 管理費收繳
          - text: ：每月
          - strong [ref=e539]: 20 號
          - text: 為系統關帳日，需登入後台進行結算與報表產出。
        - listitem [ref=e540]:
          - strong [ref=e541]: 包裹通知
          - text: ：確實登錄，系統將自動推播給住戶。
        - listitem [ref=e542]:
          - strong [ref=e543]: 瓦斯度數回報
          - text: ：提醒住戶透過 App 回報度數。
      - heading "5.2 公告發布" [level=3] [ref=e544]
      - list [ref=e545]:
        - listitem [ref=e546]: 智生活 App 為社區「公告張貼三處」之二（另外兩處為 Line 公告群組、信箱區螢幕）。
      - heading "6. 其他數位設備與規範" [level=2] [ref=e547]
      - heading "6.1 信箱區液晶螢幕" [level=3] [ref=e548]
      - list [ref=e549]:
        - listitem [ref=e550]:
          - strong [ref=e551]: 用途
          - text: ：電子佈告欄（公告張貼三處之三）。
        - listitem [ref=e552]:
          - strong [ref=e553]: 內容
