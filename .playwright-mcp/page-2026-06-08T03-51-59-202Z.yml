              - strong [ref=e933]: 事前宣導
              - text: ：提醒儲水。
              - strong [ref=e934]: 請 13-15 樓住戶 09:00 前關閉加壓馬達電源
              - text: ，以免空轉燒毀。
            - listitem [ref=e935]:
              - strong [ref=e936]: 09:10-11:20
              - text: ：放空頂樓上水塔（開始停水）。
            - listitem [ref=e937]:
              - strong [ref=e938]: 11:20-13:00
              - text: ：清洗頂樓上水塔。
            - listitem [ref=e939]:
              - strong [ref=e940]: 13:00-15:00
              - text: ：地下室打水至頂樓（逐漸復水），清洗地下室下水塔。
              - list [ref=e941]:
                - listitem [ref=e942]:
                  - strong [ref=e943]: 復水提醒
                  - text: ：若無水請開水龍頭排氣。13-15 樓住戶記得重啟加壓馬達。
            - listitem [ref=e944]:
              - strong [ref=e945]: 15:00-17:00
              - text: ：清洗地下室下水箱。
      - heading "1.6 高壓沖洗" [level=3] [ref=e946]
      - list [ref=e947]:
        - listitem [ref=e948]:
          - strong [ref=e949]: 緣由
          - text: ：曾有騎機車住戶因雨天地下室入口車道濕滑而摔倒。
        - listitem [ref=e950]:
          - strong [ref=e951]: 解決方案
          - text: ：評估後暫不採化學或物理防滑工程，維持每年兩次由物業公司執行高壓沖洗，已有效改善青苔問題。
        - listitem [ref=e952]:
          - strong [ref=e953]: 延伸待辦
          - text: ：需請總幹事向潤泰清潔人員確認上次交接的「吹苔清」藥劑施作地點（據稱為身障停車位區域）。
