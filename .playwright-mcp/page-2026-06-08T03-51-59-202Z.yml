      - heading "3.1.2 上架要件" [level=4] [ref=e1376]
      - list [ref=e1377]:
        - listitem [ref=e1378]: 招標文件需蓋社區大章
        - listitem [ref=e1379]:
          - text: 必須註明「
          - strong [ref=e1380]: 不收押標金及履約保證金
          - text: 」
      - heading "3.1.3 服務延續性原則" [level=4] [ref=e1381]
      - paragraph [ref=e1382]:
        - text: 社區一貫的價值觀：
        - strong [ref=e1383]: 「服務延續性與穩定性」優於「廠商比價」
        - text: 。除非廠商表現有明顯不足，否則傾向續約。
      - paragraph [ref=e1384]: 對總幹事的工作意義：
      - list [ref=e1385]:
        - listitem [ref=e1386]: 物業合約年底議價的協助項目，請按 §3.1.1 的時程準備（9 月彙整資料、10 月若招標則協助刊登、11 月協助會議紀錄）
        - listitem [ref=e1387]: 議價方向與結果由管委會議決後通知總幹事執行
      - heading "3.2 其他保養合約年度換約" [level=3] [ref=e1388]
      - paragraph [ref=e1389]:
        - text: 機電、園藝、垃圾清運、電梯（兩年期）、消防（含安檢） — 各合約到期前
        - strong [ref=e1390]: 2 個月
        - text: 啟動議價，避免年底匆忙積壓。詳細各廠商資訊見第三章 §1。
      - heading "4. 清潔" [level=2] [ref=e1391]
      - heading "4.1 人力管理" [level=3] [ref=e1392]
      - list [ref=e1393]:
        - listitem [ref=e1394]: 需持續觀察並向物業公司反映「休假不補人」對品質的影響，避免連續兩天無人清潔。
      - heading "4.2 排程 SOP" [level=3] [ref=e1395]
      - list [ref=e1396]:
        - listitem [ref=e1397]:
          - strong [ref=e1398]: 緣由
          - text: ：應對住戶對於「走廊為何多日未掃」的抱怨。
        - listitem [ref=e1399]:
          - strong [ref=e1400]: 管理要求
          - text: ：總幹事需維護詳細「清潔工作排程表」（可參考新美齊時代範本）。
        - listitem [ref=e1401]:
          - strong [ref=e1402]: 溝通用途
          - text: ：遇投訴時，出示排程告知預計打掃日期。
      - heading "4.3 環境維護技巧" [level=3] [ref=e1403]
      - list [ref=e1404]:
        - listitem [ref=e1405]:
          - strong [ref=e1406]: 防狗尿
          - text: ：可使用零用金購置「明星花露水」噴灑於騎樓柱邊驅趕犬隻。
      - heading "5. 垃圾清運與環保室管理" [level=2] [ref=e1407]
      - heading "5.1 變革背景與核心原因" [level=3] [ref=e1408]
      - list [ref=e1409]:
        - listitem [ref=e1410]:
          - paragraph [ref=e1411]:
            - strong [ref=e1412]: 核心改變
            - text: ：因大型壓縮車無法進入，改由清潔人員打包後以 3.5 噸貨車清運。
        - listitem [ref=e1413]:
          - paragraph [ref=e1414]:
            - link "原始作業模式" [ref=e1415] [cursor=pointer]:
              - /url: https://photos.app.goo.gl/MX3qyVDkvYjsdL287
              - strong [ref=e1416]: 原始作業模式
        - listitem [ref=e1417]:
          - paragraph [ref=e1418]:
            - strong [ref=e1419]: 主要限制因素
            - text: ：
          - list [ref=e1420]:
            - listitem [ref=e1421]:
              - strong [ref=e1422]: 地理限制
              - text: ：大型車難以通過和平東路一段 104 巷轉進社區（轉彎死角、碰撞風險）。
            - listitem [ref=e1423]:
              - strong [ref=e1424]: 經濟規模
              - text: ：社區垃圾量（1.5 噸/月）太少，廠商無意願冒險派大車。
      - heading "5.2 廠商更替與決策過程" [level=3] [ref=e1425]
      - list [ref=e1426]:
        - listitem [ref=e1427]:
          - strong [ref=e1428]: 與原廠商「誠上」的協商困境
          - text: ：
          - list [ref=e1429]:
            - listitem [ref=e1430]:
              - paragraph [ref=e1431]: 原廠商「誠上」在未經司機實際勘查的情況下逕行接單，清運近一年後，司機與廠商已不願再承受轉彎不易的風險。
            - listitem [ref=e1432]:
              - paragraph [ref=e1433]: 廠商提出方案，要求將垃圾量估算加倍（由一噸增至兩噸），否則將提前解約，且即使加價，未來也只願派遣3.5噸貨車。
            - listitem [ref=e1434]:
              - paragraph [ref=e1435]: 管委會曾嘗試溝通為司機加價，但所能提供的價格，仍無法覆蓋司機所認知的風險。
        - listitem [ref=e1436]:
          - strong [ref=e1437]: 尋找其他廠商的挑戰
          - text: ：
          - list [ref=e1438]:
            - listitem [ref=e1439]: 垃圾清運廠商間彼此熟識，會相互打聽社區風評與棄單原因。
            - listitem [ref=e1440]: 經管委會與總幹事實際洽詢本地區其他社區（如耕曦、正隆天第）的清運廠商後，得到的反應大同小異，幾乎可以判斷已無廠商願意派遣大型垃圾壓縮車前來服務。
            - listitem [ref=e1441]: 其他社區（如隔壁大安晶華）的解決方案則是派員追垃圾車，此模式不適合本社區。
        - listitem [ref=e1442]:
          - strong [ref=e1443]: 更換為新廠商「極速環保/仕功」
          - text: ：
          - list [ref=e1444]:
            - listitem [ref=e1445]: 2024/02/01 起接手（原為「耕曦社區」廠商）。
            - listitem [ref=e1446]:
              - strong [ref=e1447]: 選擇原因
              - text: ：願意承接風險，且同意採「連續七天秤重」推估月總量，計價合理；春節不休息。
      - blockquote [ref=e1448]:
        - paragraph [ref=e1449]: 2025年間仍有其他垃圾清運廠商到社區來招攬生意，但是在經過司機路線場勘後紛紛放棄。
      - heading "5.3 現行作業流程與影響" [level=3] [ref=e1450]
      - list [ref=e1451]:
        - listitem [ref=e1452]:
          - paragraph [ref=e1453]:
            - strong [ref=e1454]: 垃圾桶更換
            - text: ：
          - list [ref=e1455]:
            - listitem [ref=e1456]: 移除 660L 深底大子車（無法撈取）。
            - listitem [ref=e1457]:
              - text: 改用多個
              - strong [ref=e1458]: 175L 淺底垃圾桶
              - text: （方便清潔員徒手打包）。
        - listitem [ref=e1459]:
          - paragraph [ref=e1460]:
            - strong [ref=e1461]: 衍生問題與應對
            - text: ：
          - list [ref=e1462]:
            - listitem [ref=e1463]: 小桶易滿且投遞口不易對準。
            - listitem [ref=e1464]: 應對：清潔員需頻繁對調桶位；總幹事引導住戶若前方桶滿，直接開冷藏庫門丟後方空桶。
      - heading "5.4 總幹事與住戶配合事項" [level=3] [ref=e1465]
      - list [ref=e1466]:
        - listitem [ref=e1467]:
          - text: 此改變加重清潔員負擔，需籲請住戶配合：
          - list [ref=e1468]:
            - listitem [ref=e1469]: 確實分類。
            - listitem [ref=e1470]: 廚餘瀝乾、垃圾袋密封綁緊。
            - listitem [ref=e1471]: 維持環保室整潔。
      - heading "5.5 相關資產與附註" [level=3] [ref=e1472]
      - list [ref=e1473]:
        - listitem [ref=e1474]:
          - paragraph [ref=e1475]:
            - strong [ref=e1476]: 舊垃圾子車去向
            - text: ：原 660 公升子車清洗後，暫存於
            - strong [ref=e1477]: B4 消防機房前
            - text: 。
        - listitem [ref=e1478]:
          - paragraph [ref=e1479]:
            - strong [ref=e1480]: 為何無法每日秤重？
            - text: ：
          - list [ref=e1481]:
            - listitem [ref=e1482]: 秤重耗時，對以「總載運量」計效的司機無效益（寧願多跑幾家）。
            - listitem [ref=e1483]:
              - strong [ref=e1484]: 市場生態
              - text: ：此為台北市普遍現象（規模小、單價低 4-5 元）；與新北市（規模大、單價高 7-8 元）不同。
        - listitem [ref=e1485]:
          - paragraph [ref=e1486]:
            - strong [ref=e1487]: B1-43 號車位使用權
            - text: ：
          - list [ref=e1488]:
            - listitem [ref=e1489]: 管委會協調該車位無償提供給廠商每日暫停，總幹事需了解此交換歷史。
        - listitem [ref=e1490]:
          - paragraph [ref=e1491]:
            - strong [ref=e1492]: 清運價格調整
            - text: ：
          - list [ref=e1493]:
            - listitem [ref=e1494]: 2024/02 起：5,000 元/噸（月費 7,875 元）。
            - listitem [ref=e1495]:
              - text: 2025/04 起：
              - strong [ref=e1496]: 6,000 元/噸
              - text: （因焚化爐漲價），月費
              - strong [ref=e1497]: 9,450 元
              - text: （含稅）。
      - heading "第四章：行政、財務與法規遵循" [level=1] [ref=e1498]
      - heading "1. 銀行與財務帳戶" [level=2] [ref=e1499]
      - heading "1.1 往來銀行策略" [level=3] [ref=e1500]
      - list [ref=e1501]:
        - listitem [ref=e1502]:
          - strong [ref=e1503]: 主要銀行
          - text: ：
          - strong [ref=e1504]: 永豐銀行
          - text: 。
        - listitem [ref=e1505]:
          - strong [ref=e1506]: 選擇原因
          - text: ：雖然周邊有更近的台北企銀、土地銀行，但因永豐銀行為社區管理 APP「智生活」的主要配合銀行，故第一屆管委會選定其為主要往來銀行。
      - heading "1.2 各分行帳戶明細與用途" [level=3] [ref=e1507]
      - list [ref=e1508]:
        - listitem [ref=e1509]:
          - strong [ref=e1510]: 建成分行
          - text: (開戶行，但距離遠，現僅作帳戶存續)
          - list [ref=e1511]:
            - listitem [ref=e1512]:
              - strong [ref=e1513]: 管理費帳戶
              - list [ref=e1514]:
                - listitem [ref=e1515]: 戶名：閱大安管理委員會
                - listitem [ref=e1516]:
                  - text: 帳號：
                  - code [ref=e1517]: 103-018-2003121-9
            - listitem [ref=e1518]:
              - strong [ref=e1519]: 公共基金帳戶
              - list [ref=e1520]:
                - listitem [ref=e1521]: 戶名：閱大安管理委員會
                - listitem [ref=e1522]:
                  - text: 帳號：
                  - code [ref=e1523]: 103-018-2003120-2
        - listitem [ref=e1524]:
          - strong [ref=e1525]: 南門分行
          - text: (最近但不方便)
          - list [ref=e1526]:
            - listitem [ref=e1527]: 雖為實體距離最近，但步行辛苦，故幾無往來。
        - listitem [ref=e1528]:
          - strong [ref=e1529]: 東門分行
          - text: (主要實體往來行)
          - list [ref=e1530]:
            - listitem [ref=e1531]:
              - strong [ref=e1532]: 優勢
              - text: ：捷運古亭站搭一站至東門站，4 號出口即達，交通最便。
            - listitem [ref=e1533]:
              - strong [ref=e1534]: 充電樁線路維護費帳戶
              - text: (專款專用)
              - list [ref=e1535]:
                - listitem [ref=e1536]: 戶名：閱大安管理委員會
                - listitem [ref=e1537]:
                  - text: 帳號：
                  - code [ref=e1538]: 033-018-0013393-2
                - listitem [ref=e1539]:
                  - strong [ref=e1540]: 開戶背景
                  - text: ：原永豐拒絕多開第三帳戶，經解釋充電樁基金需專款專用後才獲准開設。
      - heading "2. 財務流程" [level=2] [ref=e1541]
      - heading "2.1 財務報表製作" [level=3] [ref=e1542]
      - list [ref=e1543]:
        - listitem [ref=e1544]:
          - strong [ref=e1545]: 分工模式
          - text: ：
          - list [ref=e1546]:
            - listitem [ref=e1547]:
              - strong [ref=e1548]: 前端
              - text: ：總幹事於「新都興社區財務系統」登錄支出與確認管理費收繳。
            - listitem [ref=e1549]:
              - strong [ref=e1550]: 後端
              - text: ：由潤泰總公司會計支援製作正式財報。
        - listitem [ref=e1551]:
          - strong [ref=e1552]: 目標
          - text: ：潤泰會計將持續輔導，最終目標為移轉給總幹事獨立製作。
      - heading "2.2 零用金管理" [level=3] [ref=e1553]
      - list [ref=e1554]:
        - listitem [ref=e1555]:
          - strong [ref=e1556]: 標準作業
          - text: ：廠商押金退款等應由
          - strong [ref=e1557]: 管理費主帳戶
          - text: 支出，
          - strong [ref=e1558]: 嚴禁直接從零用金墊付
          - text: ，避免帳務混亂（2025/01 曾發生誤用零用金支付公共意外險保險金之案例，需引以為戒）。
        - listitem [ref=e1559]:
          - strong [ref=e1560]: 撥補程序
          - text: ：如有不合規帳目，需透過正式請款流程進行「撥補」，確保帳實相符。
      - heading "2.3 管理費收繳方式比較" [level=3] [ref=e1561]
      - paragraph [ref=e1562]: 總幹事需掌握以下兩種模式的優缺點，以回應住戶詢問：
      - list [ref=e1563]:
        - listitem [ref=e1564]:
          - strong [ref=e1565]: 模式 A：智生活虛擬帳號 (永豐中崙分行)
          - list [ref=e1566]:
            - listitem [ref=e1567]:
              - strong [ref=e1568]: 機制
              - text: ：每戶每月帳號不同。
            - listitem [ref=e1569]:
              - strong [ref=e1570]: 繳款管道
              - text: ：APP 信用卡、超商 (手續費 10-15 元)、轉帳。
            - listitem [ref=e1571]:
              - strong [ref=e1572]: 優點 (管理端)
              - text: ：系統自動對帳，方便。
            - listitem [ref=e1573]:
              - strong [ref=e1574]: 缺點 (住戶端)
              - text: ：因帳號每月變動，
              - strong [ref=e1575]: 無法設定銀行自動轉帳
              - text: 。
        - listitem [ref=e1576]:
          - strong [ref=e1577]: 模式 B：固定帳號匯款 (永豐建成分行)
          - list [ref=e1578]:
            - listitem [ref=e1579]:
              - strong [ref=e1580]: 帳號
              - text: ：
              - code [ref=e1581]: 103-018-200-31219
              - text: (銀行代號 807)。
            - listitem [ref=e1582]:
              - strong [ref=e1583]: 優點 (住戶端)
              - text: ：帳號固定，可設定每月自動定期定額轉帳 (適合一次繳多月或懶人法)。
            - listitem [ref=e1584]:
              - strong [ref=e1585]: 缺點 (管理端)
              - text: ：需人工核對匯款帳號後 5 碼。
      - heading "2.4 電動車充電代墊代收流程" [level=3] [ref=e1586]
      - list [ref=e1587]:
        - listitem [ref=e1588]:
          - strong [ref=e1589]: 代墊
          - text: ：管委會收到台電帳單，先以管理費支付。
        - listitem [ref=e1590]:
          - strong [ref=e1591]: 計算
          - text: ：總幹事依據 EMS 報表計算個別住戶電費。
        - listitem [ref=e1592]:
          - strong [ref=e1593]: 收費
          - text: ：發出收費通知 (或併入管理費)。
        - listitem [ref=e1594]:
          - strong [ref=e1595]: 歸墊
          - text: ：收回款項後歸入管理費帳戶。
      - heading "2.5 對住戶報告財務的口徑原則" [level=3] [ref=e1596]
      - paragraph [ref=e1597]:
        - text: 這節是
        - strong [ref=e1598]: 做年度財報簡報時必讀
        - text: ，避免同一份簡報內出現自打嘴巴的論述（2026 第五屆首次 AGM 排雷出來的共識）。
      - heading "2.5.1 總資產視角（重要框架）" [level=4] [ref=e1599]
      - paragraph [ref=e1600]:
        - text: "社區的「維修基金提撥」（每月 6 萬，從 #31219 一般帳戶撥入 #31202 公共基金帳戶）本質上是"
        - strong [ref=e1601]: 內部轉帳，不是費用
        - text: ——錢只是從左口袋換到右口袋，住戶共有的總資產淨值並未減少。
      - document [ref=e1603]:
        - generic [ref=e1605]:
          - generic [ref=e1610]:
            - generic [ref=e1615]:
              - text: 每月 6 萬
              - text: 內部轉帳
            - generic [ref=e1619]: 帳面結餘
            - generic [ref=e1623]: 同樣計入
          - generic [ref=e1624]:
            - generic [ref=e1630]:
              - text: 本期收入
              - text: 管理費
            - generic [ref=e1636]:
              - text: 一般帳戶
              - text: "#31219"
            - generic [ref=e1642]:
              - text: 公共基金
              - text: "#31202"
            - generic [ref=e1648]:
              - text: 經常性費用
              - text: 物業/水電/保養
            - generic [ref=e1654]:
              - text: 業主權益
              - text: = 總資產
      - paragraph [ref=e1655]:
