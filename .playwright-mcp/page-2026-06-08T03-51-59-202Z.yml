      - heading "2.4 Google Tasks（任務指派）" [level=3] [ref=e462]
      - list [ref=e463]:
        - listitem [ref=e464]:
          - text: 此為
          - strong [ref=e465]: 主任委員與總幹事之間
          - text: 的主要溝通介面。
        - listitem [ref=e466]: 日常待辦事項、臨時交辦任務，均透過此工具進行指派與追蹤，避免 Line 訊息洗版而被遺忘。
      - heading "2.5 Google Photos（影像資產庫）" [level=3] [ref=e467]
      - list [ref=e468]:
        - listitem [ref=e469]:
          - strong [ref=e470]: 集中管理原則
          - text: ：
          - list [ref=e471]:
            - listitem [ref=e472]: 本社區的相關照片/影片請盡量用已經設定好社區Google帳號的手機進行拍攝，並注意是否已經順利上傳至Google Photos的空間
            - listitem [ref=e473]:
              - text: 若您私人手機的畫質較社區手機佳，或手邊剛好只有私人手機，也歡迎直接使用私人手機拍攝，但請記得最後還是將相片
              - strong [ref=e474]: 手動上傳
              - text: 至Google Photos
        - listitem [ref=e475]:
          - strong [ref=e476]: 禁用平台
          - text: ：
          - list [ref=e477]:
            - listitem [ref=e478]:
              - text: ❌
              - strong [ref=e479]: Line 相簿
              - text: ：檔案會過期，畫質會被壓縮，且不易搜尋。
            - listitem [ref=e480]:
              - text: ❌
              - strong [ref=e481]: YouTube
              - text: ：社區雖然也可上傳影片至Youtube且較不佔空間，但考慮相片與影片的集中度與便利性等問題，請仍然以Google Photos為唯一的上傳平台，不另行上傳 YouTube。
        - listitem [ref=e482]:
          - strong [ref=e483]: 拍攝指引（短影片優先）
          - text: ：
          - list [ref=e484]:
            - listitem [ref=e485]:
              - strong [ref=e486]: 以短影片為主，靜態相片為輔
              - text: ：對於漏水、設備異音等動態問題，影片能提供比照片更豐富的資訊。
            - listitem [ref=e487]:
              - strong [ref=e488]: 附帶旁白
              - text: ：拍攝時應有意識地運用廣角、特寫、多視角取景，並搭配口頭說明，讓平日比較沒有接觸到社區細節的住戶或管委能夠較完整的瞭解問題全貌
      - heading "2.6 Google Drive（雲端檔案總管）" [level=3] [ref=e489]
      - list [ref=e490]:
        - listitem [ref=e491]:
          - strong [ref=e492]: 工作模式變革（重要）
          - text: ：
          - list [ref=e493]:
            - listitem [ref=e494]:
              - text: ❌
              - strong [ref=e495]: 錯誤做法
              - text: ：在電腦桌面編輯 Word/Excel 檔 -> 做完再上傳（容易造成版本混亂、漏上傳）。
            - listitem [ref=e496]:
              - text: ✅
              - strong [ref=e497]: 正確做法
              - text: ：
              - strong [ref=e498]: 直接在 Google Drive 資料夾中開啟檔案進行編輯
              - text: 。Google 具備即時儲存與版本紀錄功能，確保資料永遠同步。
        - listitem [ref=e499]:
          - strong [ref=e500]: 容量說明
          - text: ：本社區 Google One 方案已於 2025 年 7 月擴容至
          - strong [ref=e501]: 200GB
          - text: ，請安心存放文件與影像。
      - heading "3. Line 官方與群組管理" [level=2] [ref=e502]
      - heading "3.1 群組分類與功能" [level=3] [ref=e503]
      - paragraph [ref=e504]: 社區 Line 群組區分為不同層級，總幹事需嚴格遵守發言界線：
      - list [ref=e505]:
        - listitem [ref=e506]:
