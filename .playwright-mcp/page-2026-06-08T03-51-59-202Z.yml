              - text: ：採「集中處理」或「一次性全數更換」，換下良品做備品，避免頻繁搭架。
            - listitem [ref=e963]:
              - strong [ref=e964]: 安全責任
              - text: ：嚴禁非專業人員搭架。合約需明訂廠商指派持證（高空作業證照）人員，以實現責任轉移。
            - listitem [ref=e965]:
              - strong [ref=e966]: 長期方案
              - text: ：研議採購社區自有鷹架供廠商使用，以降低報價。
