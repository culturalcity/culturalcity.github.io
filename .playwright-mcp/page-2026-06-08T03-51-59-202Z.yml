      - heading "7.4 法規衍生改善要求（115 年範例）" [level=3] [ref=e2382]
      - paragraph [ref=e2383]:
        - text: 公安檢查不只是「派人來看一遍」 —
        - strong [ref=e2384]: 每次檢查都會帶來新的法規衍生改善要求
        - text: ，總幹事要主動跟廠商確認當年法規變化。115 年實例：
      - list [ref=e2385]:
        - listitem [ref=e2386]:
          - strong [ref=e2387]: 各樓層安全梯門檻
          - text: 需貼
          - strong [ref=e2388]: 反光防滑膠帶
          - text: （已執行）
        - listitem [ref=e2389]:
          - strong [ref=e2390]: B1 梯廳通往停車場的防火門
          - text: ：消防規定關閉時不能上鎖且必須能直接推開 → 將該扇門的磁力鎖（陽極鎖）感應處貼起使其無法通電上鎖
      - paragraph [ref=e2391]:
        - strong [ref=e2392]: 這類「順便要做的事」往往是公安檢查最大的價值來源 — 別只把它當作報備程序。
      - heading "8. 住戶室內裝修管理 SOP" [level=2] [ref=e2393]
      - heading "8.1 階段一：申請審核 (判斷要務)" [level=3] [ref=e2394]
      - paragraph [ref=e2395]: 總幹事需依《建築物室內裝修管理辦法》判斷是否需申請許可：
      - list [ref=e2396]:
        - listitem [ref=e2397]:
          - strong [ref=e2398]: 必需申請之條件
          - text: ：
          - list [ref=e2399]:
            - listitem [ref=e2400]:
              - strong [ref=e2401]: 天花板
              - text: ：固著於構造體之裝修。
            - listitem [ref=e2402]:
              - strong [ref=e2403]: 內部牆面
              - text: ：不含壁紙壁布。
            - listitem [ref=e2404]:
              - strong [ref=e2405]: 固定隔屏
              - text: ：高度超過 1.2 公尺 (含系統櫃)。
            - listitem [ref=e2406]:
              - strong [ref=e2407]: 分間牆變更
              - text: 。
        - listitem [ref=e2408]:
          - strong [ref=e2409]: 文件查核
          - text: ：匯款證明 (保證金 5 萬)、申請單、切結書、施工圖、許可文件 (若符合上述條件)。
      - heading "8.2 階段二：施工前現場管理" [level=3] [ref=e2410]
      - list [ref=e2411]:
        - listitem [ref=e2412]:
          - strong [ref=e2413]: 保護工程會勘 (關鍵)
          - text: ：廠商施作保護「前」，務必錄影存證公共區域現況，釐清責任。
        - listitem [ref=e2414]:
          - strong [ref=e2415]: 保護材標準
          - text: ：
          - list [ref=e2416]:
            - listitem [ref=e2417]: 地板/壁面：三層 (防水布+PP板+木板)。
            - listitem [ref=e2418]: 電梯：雙層 (PP板+木板)，需保護門框。
            - listitem [ref=e2419]: 門口：透明防塵布簾。
      - heading "8.3 階段三：施工期間巡檢" [level=3] [ref=e2420]
      - list [ref=e2421]:
        - listitem [ref=e2422]:
          - strong [ref=e2423]: 每日清潔
          - text: ：收工前 30 分鐘巡查電梯與動線。
        - listitem [ref=e2424]:
          - strong [ref=e2425]: 廢棄物
          - text: ：嚴禁堆置社區或丟入垃圾間。
        - listitem [ref=e2426]:
          - strong [ref=e2427]: 違規開罰
          - text: ：依罰則表開立通知書，並從保證金扣款。
      - heading "8.4 階段四：完工與退款" [level=3] [ref=e2428]
      - list [ref=e2429]:
        - listitem [ref=e2430]:
          - strong [ref=e2431]: 陽台測試
          - text: ：需協同測試前後陽台排水是否暢通。
        - listitem [ref=e2432]:
          - strong [ref=e2433]: 拆除會勘
          - text: ：拆除保護材時再次會勘，確認無損後始可退還保證金。
      - heading "9. 圖書管理" [level=2] [ref=e2434]
      - heading "9.1 來源與原則" [level=3] [ref=e2435]
      - list [ref=e2436]:
        - listitem [ref=e2437]:
          - strong [ref=e2438]: 來源
          - text: ：敦寶建設回饋 (Boven 選書，2024 年期滿未續約)、住戶捐贈。
        - listitem [ref=e2439]:
          - strong [ref=e2440]: 管理原則
          - text: ：
          - strong [ref=e2441]: 禁止外借
          - text: 。為減少物業負擔，請住戶於公共區域閱讀，不外借回自家。
      - heading "10. 議題：社區採購與比價流程" [level=2] [ref=e2442]
      - heading "10.1 困境分析" [level=3] [ref=e2443]
      - list [ref=e2444]:
        - listitem [ref=e2445]:
          - strong [ref=e2446]: 規定
          - text: ：超過一萬元需三家比價。
        - listitem [ref=e2447]:
          - strong [ref=e2448]: 實務痛點
          - text: ：
          - list [ref=e2449]:
            - listitem [ref=e2450]: 金額小、利潤薄，廠商不願「陪標」。
            - listitem [ref=e2451]: 緊急搶修或獨家代理產品，根本找不到三家。
            - listitem [ref=e2452]: 長期導致社區信用受損，廠商拒絕報價。
      - heading "10.2 解決策略" [level=3] [ref=e2453]
      - list [ref=e2454]:
        - listitem [ref=e2455]:
          - strong [ref=e2456]: 修訂規約
          - text: ：增訂緊急搶修或獨家代理之例外條款。
        - listitem [ref=e2457]:
          - strong [ref=e2458]: 續約機制
          - text: ：針對優良廠商建立評估續約制，取代重複比價。
        - listitem [ref=e2459]:
          - strong [ref=e2460]: 建立備援
          - text: ：平時將非核心小案件發包給備援廠商，培養關係以備不時之需。
      - heading "第五章：安全防災相關標準作業程序" [level=1] [ref=e2461]
      - heading "1. 安全防災" [level=2] [ref=e2462]
      - heading "1.1 安防系統" [level=3] [ref=e2463]
      - list [ref=e2464]:
        - listitem [ref=e2465]:
          - strong [ref=e2466]: 基礎要求
          - text: ：需全盤了解監視器與門禁系統運作狀況、鑰匙與門禁卡管理權限。
        - listitem [ref=e2467]:
          - strong [ref=e2468]: 伺服器維護
          - text: ：
          - list [ref=e2469]:
            - listitem [ref=e2470]:
              - strong [ref=e2471]: 設備
              - text: ：使用飛瑞 UPS 鉛酸電池。
            - listitem [ref=e2472]:
              - strong [ref=e2473]: 維護頻率
              - text: ：應
              - strong [ref=e2474]: 每半年放電一次
              - text: 以延長電池壽命。
      - heading "1.2 颱風" [level=3] [ref=e2475]
      - paragraph [ref=e2476]:
        - strong [ref=e2477]: 自動提醒系統
        - text: ：社區後台每天 6:00 / 12:00 / 18:00 自動讀取中央氣象署警特報資料，臺北市進入陸上颱風警報時，culturalcity85 日曆會自動建立
        - strong [ref=e2478]: 🌀 颱風陸上警報・防颱準備清單
        - text: （紅色全天事件）；警報解除後隔日會自動建立
        - strong [ref=e2479]: 🔍 颱風後巡查清單
        - text: （藍色全天事件）。
      - paragraph [ref=e2480]:
        - text: 系統設定為「臺北市進入陸上颱風警報」才觸發，
        - strong [ref=e2481]: 海上颱風警報不會觸發
        - text: ，社區從陸上警報才開始進入防颱模式。臺北市範圍涵蓋大安區，所以「臺北市發布陸上警報」與「大安區受影響」是等義的。
      - heading "1.2.1 防颱準備公設施作項目" [level=4] [ref=e2482]
      - paragraph [ref=e2483]: 颱風來臨前的施作項目：
      - list [ref=e2484]:
        - listitem [ref=e2485]:
          - paragraph [ref=e2486]: R3F電梯機房窗戶檢查與關閉
          - list [ref=e2487]:
            - listitem [ref=e2488]: 務必將靠電梯設備側的活動百葉窗葉片關閉
        - listitem [ref=e2489]:
          - paragraph [ref=e2490]: R2F水錶室窗戶檢查與關閉
        - listitem [ref=e2491]:
          - paragraph [ref=e2492]: 2F-15F排煙窗、窗戶檢查與關閉
        - listitem [ref=e2493]:
          - paragraph [ref=e2494]: 2F-15F各樓層A、B兩安全梯防火門檢查與關閉
        - listitem [ref=e2495]:
          - paragraph [ref=e2496]: 1F、B1F排水溝檢查
          - list [ref=e2497]:
            - listitem [ref=e2498]: 1F後花園排水溝檢查及淤泥、落葉清除
            - listitem [ref=e2499]: 1F車坡道出入口排水溝檢查及淤泥、落葉清除
            - listitem [ref=e2500]: B1F車坡道出入口排水溝檢查及淤泥、落葉清除
            - listitem [ref=e2501]: 1F行動不便車位拒馬綁牢固定串聯，放倒
        - listitem [ref=e2502]:
          - paragraph [ref=e2503]: R樓閱覽室防颱作業
          - list [ref=e2504]:
            - listitem [ref=e2505]:
              - text: R樓閱覽室出入口門口沙包預防
              - list [ref=e2506]:
                - listitem [ref=e2507]: 沙包平時收在地下停車場B4消防機房裡，風雨還不大時沙包可暫堆在近內外出入門口窗戶下方
            - listitem [ref=e2508]:
              - text: R樓空中花園桌椅收入室內
              - list [ref=e2509]:
                - listitem [ref=e2510]: 大理石板易碎，曾發生搬動過程掉落碎裂需花費更換，搬動時請小心
        - listitem [ref=e2511]:
          - paragraph [ref=e2512]: 防水閘門安裝
          - blockquote [ref=e2513]:
            - paragraph [ref=e2514]:
              - text: 雖然羅斯福路淹水的機會不高，但是請新總幹事上任時務必
              - strong [ref=e2515]: 至少安裝一次防水閘門
              - text: 。
            - paragraph [ref=e2516]:
              - strong [ref=e2517]: 操作提醒
              - text: ：防水閘門普遍被認為不太好裝，有其訣竅，安裝前請務必參照教學影片練習。
          - list [ref=e2518]:
            - listitem [ref=e2519]:
              - text: 前門防水閘門安裝
              - list [ref=e2520]:
                - listitem [ref=e2521]: 全程需時約40分鐘──防水閘門支柱安裝以及門片安裝各約20分鐘。
                - listitem [ref=e2522]: 前門的防水閘門支柱較容易安裝。
                - listitem [ref=e2523]:
                  - text: 防水閘門片在從上往下安裝時，由於門片與門片間有橡膠墊可能會造成無法很順利的往下卡緊、門片之間有間隙，也會造成手轉的螺絲難以對位鎖入的情況，這種狀況下最好能
                  - strong [ref=e2524]: 準備膠槌將門片稍作敲打
                  - text: 較能順利密合與將螺絲鎖入。
                - listitem [ref=e2525]: 在風雨還不明顯的時候我們會先將防水閘門支柱的部分先安裝好，門片暫放置於入口進門左側處，底部先鋪瓦楞紙板或厚紙板以免門片刮傷大理石地板。
            - listitem [ref=e2526]:
              - text: 後門防水閘門安裝
              - list [ref=e2527]:
                - listitem [ref=e2528]: 全程需時約40分鐘──防水閘門支柱安裝以及門片安裝各約20分鐘。
                - listitem [ref=e2529]:
                  - text: 後門的防水閘門支柱安裝難度較高
                  - list [ref=e2530]:
                    - listitem [ref=e2531]: 由於所螺絲時螺帽上方的空間限制，在鎖入兩邊上下個三根螺絲的時候最好使用10元硬幣而非螺絲起子；
                    - listitem [ref=e2532]: 鎖螺絲的順序最好是由最下面的螺絲開始往上鎖（有實證成功經驗）；如果從上面的螺絲開始鎖的話，下面兩顆螺絲孔會有對位的困難。
                - listitem [ref=e2533]: 在風雨還不明顯的時候我們會先將防水閘門支柱的部分先安裝好，門片暫放置於門外左側處，底部先鋪瓦楞紙板或厚紙板以免門片刮傷大理石地板。
        - listitem [ref=e2534]:
          - paragraph [ref=e2535]: 地排蓋拔除
          - list [ref=e2536]:
            - listitem [ref=e2537]: 一樓至十五樓安全梯（A梯，靠近電梯之安全梯）流水地排蓋拔除
            - listitem [ref=e2538]: 流水地排蓋拔除置放旁邊
            - listitem [ref=e2539]: 一樓A安全梯排水溝拆除蓋片，引導雨勢大時的水流疏通，有部分水量是由雨水打入樓上安全梯間後所流到一樓來的
            - listitem [ref=e2540]: 茶水間水槽底部地排蓋設法打開，並可考慮將圍牆上的排水孔（從狀元及第端流往圍牆內的）堵住
        - listitem [ref=e2541]:
          - paragraph [ref=e2542]: 與狀元及第鄰接牆的排水疏通
          - list [ref=e2543]:
            - listitem [ref=e2544]: 該洞必須疏通後水才有辦法往暗溝排走
      - heading "1.2.2 災後巡查" [level=4] [ref=e2545]
      - paragraph [ref=e2546]:
        - text: 颱風警報解除後系統會自動建立 🔍 颱風後巡查清單事件（隔日全天）。視當日風雨狀況執行，雨勢仍大可延至次日。
        - strong [ref=e2547]: 重點是確認災損狀況、及早通報、及早處理
        - text: 。
      - paragraph [ref=e2548]: 巡查項目：
      - list [ref=e2549]:
        - listitem [ref=e2550]: 地下室排水溝、機房地坪是否積水
        - listitem [ref=e2551]: 頂樓植栽倒伏、盆器破損狀況
        - listitem [ref=e2552]: 外牆磁磚剝落（從對街用望遠鏡或無人機檢查）
        - listitem [ref=e2553]: 招牌、廣告物、頂樓設備固定情況
        - listitem [ref=e2554]: 停車場入口擋水閘門 / 抽水馬達回復狀態
        - listitem [ref=e2555]: 電梯機房積水、電梯運作測試
        - listitem [ref=e2556]: 緊急照明、逃生燈是否正常
        - listitem [ref=e2557]: 信箱區 / 公佈欄漏水
        - listitem [ref=e2558]: 中庭排水孔阻塞（落葉、塑膠袋）
        - listitem [ref=e2559]: 對講機、門禁系統運作正常
      - paragraph [ref=e2560]:
        - text: 巡查發現異常處請
        - strong [ref=e2561]: 拍照記錄、通知主委、視損害程度決定是否動用社區公基金修繕
        - text: 。重大災損（外牆磁磚成片脫落、結構性裂縫、設備損毀）建議當天通報主委召開臨時委員會。
      - heading "1.3 火災" [level=3] [ref=e2562]
      - list [ref=e2563]:
        - listitem [ref=e2564]:
          - strong [ref=e2565]: 共同消防防護計畫
          - text: ：
          - list [ref=e2566]:
            - listitem [ref=e2567]:
              - strong [ref=e2568]: 防火管理人
              - text: ：依法應由持有防火管理人證照者掛名（通常由總幹事擔任）。
            - listitem [ref=e2569]:
              - strong [ref=e2570]: 更新時機
              - text: ：應於總幹事更換或委員會換屆的時候，更新資料給
              - strong [ref=e2571]: 臺北市消防局金華分隊
              - text: 。
        - listitem [ref=e2572]:
          - strong [ref=e2573]: 電動車火災防治
          - text: ：
          - list [ref=e2574]:
            - listitem [ref=e2575]:
              - strong [ref=e2576]: 現況
              - text: ：鑑於鋰電池火災風險，提前研究新型滅火系統（如防火毯、細水霧防火系統）。
            - listitem [ref=e2577]:
              - strong [ref=e2578]: 法規備註
              - text: ：行政院國土署建築技術科目前還沒有正式推出電動車防火相關規範，需持續關注。
      - heading "1.4 地震" [level=3] [ref=e2579]
      - paragraph [ref=e2580]: 地震停止後，應立即依序執行以下巡檢與處置：
      - list [ref=e2581]:
        - listitem [ref=e2582]:
          - strong [ref=e2583]: 第一步：人員安全確認
          - list [ref=e2584]:
            - listitem [ref=e2585]: 立即檢查監視器畫面，確認各公共區域無明顯人員受傷或受困情況。
            - listitem [ref=e2586]: 檢查電梯是否因地震停止運作，確認是否有住戶受困於電梯內。若有，立即聯繫電梯維護廠商（三菱）進行救援。
        - listitem [ref=e2587]:
          - strong [ref=e2588]: 第二步：設施安全巡檢（由上至下）
          - list [ref=e2589]:
            - listitem [ref=e2590]:
              - strong [ref=e2591]: 頂樓
              - text: ：檢查水塔、水箱有無破損或位移，管線有無斷裂漏水。
            - listitem [ref=e2592]:
              - strong [ref=e2593]: 各樓層梯廳與走廊
              - text: ：
              - list [ref=e2594]:
                - listitem [ref=e2595]: 檢查天花板、消防灑水頭有無鬆脫或漏水。
                - listitem [ref=e2596]:
                  - strong [ref=e2597]: 重點項目
                  - text: ：仔細檢查牆面磁磚，特別是
                  - strong [ref=e2598]: 5樓至7樓區域
                  - text: ，是否有「膨拱」（空心）或剝落的跡象（此為 403 大地震後的災損經驗）。
        - listitem [ref=e2599]:
          - strong [ref=e2600]: 第三步：地下室巡檢
          - list [ref=e2601]:
            - listitem [ref=e2602]:
              - strong [ref=e2603]: 重點項目
              - text: ：檢查停車場的
              - strong [ref=e2604]: Epoxy 地面
              - text: 是否有新的裂縫產生。
            - listitem [ref=e2605]: 檢查發電機房、各機電設備、管線是否有損壞或漏水。
            - listitem [ref=e2606]: 檢查連續壁是否有滲水或結構裂痕。
        - listitem [ref=e2607]:
          - strong [ref=e2608]: 第四步：瓦斯管線
          - list [ref=e2609]:
            - listitem [ref=e2610]: 巡查是否有瓦斯外洩氣味，若有應立即關閉總閥並通知瓦斯公司。
        - listitem [ref=e2611]:
          - strong [ref=e2612]: 第五步：狀況回報與公告
          - list [ref=e2613]:
            - listitem [ref=e2614]: 將初步巡檢結果，立即回報給主委及管委會。
            - listitem [ref=e2615]: 透過「社區公告 Line 群組」向全體住戶發布初步安全通報。
            - listitem [ref=e2616]: 若電梯停用，應立即在各樓層電梯口張貼停用公告。
        - listitem [ref=e2617]:
          - strong [ref=e2618]: 第六步：災損記錄與修復
          - list [ref=e2619]:
            - listitem [ref=e2620]: 將所有災損情況以拍照及錄影方式詳細記錄，並上傳至 Google Photos。
            - listitem [ref=e2621]: 部分非緊急性的災損（如地下室 Epoxy 地面裂縫）可經管委會決議後，列入議題追蹤，暫緩處理。
      - heading "1.5 停電" [level=3] [ref=e2622]
      - list [ref=e2623]:
        - listitem [ref=e2624]:
          - strong [ref=e2625]: 事中應變（停電發生當下）
          - list [ref=e2626]:
            - listitem [ref=e2627]:
              - strong [ref=e2628]: 啟動緊急電力
              - text: ：確認 B2 發電機房之緊急發電機是否自動啟動。若未啟動，需手動啟動或聯繫廠商。
            - listitem [ref=e2629]:
              - strong [ref=e2630]: 人員安全確認
              - text: ：首要任務是透過電梯監視器或對講機，確認有無住戶受困。
            - listitem [ref=e2631]:
              - strong [ref=e2632]: 緊急照明
              - text: ：確認各樓層逃生梯間照明是否亮起。
            - listitem [ref=e2633]:
              - strong [ref=e2634]: 門禁管制
              - text: ：檢查大門、車道柵欄是否失效。若失效需切換為手動模式，並加派人力管制。
            - listitem [ref=e2635]:
              - strong [ref=e2636]: 公告
              - text: ：致電台電查詢原因，並於 Line 群組發布通知，提醒住戶拔除敏感電器插頭。
        - listitem [ref=e2637]:
          - strong [ref=e2638]: 事後復原與巡檢
          - list [ref=e2639]:
            - listitem [ref=e2640]:
              - strong [ref=e2641]: 關閉緊急電力
              - text: ：確認市電穩定後，依程序關閉發電機。
            - listitem [ref=e2642]:
              - strong [ref=e2643]: 系統重啟測試
              - text: ：
              - list [ref=e2644]:
                - listitem [ref=e2645]:
                  - strong [ref=e2646]: 電梯
                  - text: ：測試上下行是否順暢。
                - listitem [ref=e2647]:
                  - strong [ref=e2648]: 門禁
                  - text: ：讀卡機、自動門、柵欄是否恢復。
                - listitem [ref=e2649]:
                  - strong [ref=e2650]: 網路監控
                  - text: ：管理中心網路與監視器是否連線。
                - listitem [ref=e2651]:
                  - strong [ref=e2652]: 揚水馬達
                  - text: ：確認頂樓水塔馬達是否正常補水。
            - listitem [ref=e2653]:
              - strong [ref=e2654]: 紀錄
              - text: ：詳細記錄停電時間與復原狀況於工作日誌。
      - heading "2. 特殊場景" [level=2] [ref=e2655]
      - heading "2.1 大門保護與風力監測" [level=3] [ref=e2656]
      - list [ref=e2657]:
        - listitem [ref=e2658]:
          - strong [ref=e2659]: 緣起
          - text: ：直到 2023 年 9 月初才明確建立「遇強風需將電動大門切換為手動」的觀念。
        - listitem [ref=e2660]:
          - strong [ref=e2661]: 標準訂定的困難
          - text: ：對於「多強才是強風」缺乏客觀定義。
        - listitem [ref=e2662]:
          - strong [ref=e2663]: 2023 年小犬颱風的經驗
          - text: ：
          - list [ref=e2664]:
            - listitem [ref=e2665]:
              - strong [ref=e2666]: 原定標準
              - text: ：以「台北測站測得 8 級陣風」作為切換指標。
            - listitem [ref=e2667]:
              - strong [ref=e2668]: 實際狀況
              - text: ：雖然當時陣風僅 5 級，但在「後玻璃門與前左大門同時打開」形成的穿堂風效應下，大門關閉時被陣風加速猛力撞擊，可能損害馬達或鬆開拉臂螺絲。
        - listitem [ref=e2669]:
          - strong [ref=e2670]: 現行標準
          - text: ：
          - list [ref=e2671]:
            - listitem [ref=e2672]:
              - text: 修正為
              - strong [ref=e2673]: 「客觀資料陣風 5、6 級之間 + 配合體感」
              - text: 來決定切換手動的時機。
            - listitem [ref=e2674]: 這與是否為颱風過境無絕對關係，東北季風增強時亦可能達此標準。
        - listitem [ref=e2675]:
          - strong [ref=e2676]: 心理建設
          - text: ：請住戶做好未來「手動開門頻率增加」的心理準備。
        - listitem [ref=e2677]:
          - strong [ref=e2678]: 參考工具
          - text: ：中央氣象署風速觀測網址（台北測站數據最穩定）。
      - heading "2.2 後巷（羅斯福路二段 81 巷）臨時阻塞應變" [level=3] [ref=e2679]
      - list [ref=e2680]:
        - listitem [ref=e2681]:
          - strong [ref=e2682]: 緣由
          - text: ：停車場出入口巷道為單行道且僅容一線車道，任何臨停都將導致車輛無法進出。
        - listitem [ref=e2683]:
          - strong [ref=e2684]: 應變作業流程
          - text: ：
          - list [ref=e2685]:
            - listitem [ref=e2686]:
              - strong [ref=e2687]: 現場查勘
              - text: ：判斷性質（救護/故障/違停/卸貨）與預估時間。
            - listitem [ref=e2688]:
              - strong [ref=e2689]: 緊急公告（關鍵）
              - text: ：
              - list [ref=e2690]:
                - listitem [ref=e2691]: 立即在「住戶討論 Line 群組」發布。
                - listitem [ref=e2692]: 內容要素：事由、影響範圍、預估時效、行動建議（如建議暫緩返家）。
            - listitem [ref=e2693]:
              - strong [ref=e2694]: 現場引導
              - text: ：若時間長，派保全至巷口引導避免車輛誤入。若為違停且無法聯繫車主，通報警方。
            - listitem [ref=e2695]:
              - strong [ref=e2696]: 解除通報
              - text: ：恢復暢通後，再次發布訊息告知住戶。
            - listitem [ref=e2697]:
              - strong [ref=e2698]: 紀錄
              - text: ：記入工作日誌。
      - heading "2.3 騎樓街友問題處理原則" [level=3] [ref=e2699]
      - list [ref=e2700]:
        - listitem [ref=e2701]:
          - strong [ref=e2702]: 核心原則
          - text: ：合法合規、人道關懷。管理的是「行為」，而非「身分」。
        - listitem [ref=e2703]:
          - strong [ref=e2704]: 分級處理 SOP
          - text: ：
          - list [ref=e2705]:
            - listitem [ref=e2706]:
              - strong [ref=e2707]: 第一級：靜態停留
              - text: （僅休息，無騷擾）
              - list [ref=e2708]:
                - listitem [ref=e2709]:
                  - strong [ref=e2710]: 動作
                  - text: ：保持觀察。
                - listitem [ref=e2711]:
                  - strong [ref=e2712]: 通報
                  - text: ：撥打
                  - strong [ref=e2713]: 1999 轉社會局
                  - text: （建立社工訪視檔案，這是最根本措施）。
            - listitem [ref=e2714]:
              - strong [ref=e2715]: 第二級：影響環境
              - text: （堆物、異味）
              - list [ref=e2716]:
                - listitem [ref=e2717]:
                  - strong [ref=e2718]: 動作
                  - text: ：加強清潔、溫和勸導。
                - listitem [ref=e2719]:
                  - strong [ref=e2720]: 通報
                  - text: ：若未改善，通報
                  - strong [ref=e2721]: 1999 轉環保局
                  - text: （清理前需拍照）。
            - listitem [ref=e2722]:
              - strong [ref=e2723]: 第三級：違法或滋擾
              - text: （騷擾、攻擊、阻礙通行、侵入）
              - list [ref=e2724]:
                - listitem [ref=e2725]:
                  - strong [ref=e2726]: 動作
                  - text: ：確保安全，避免衝突。
                - listitem [ref=e2727]:
                  - strong [ref=e2728]: 通報
                  - text: ：立即撥打
                  - strong [ref=e2729]: 110 報警
                  - text: （說明違反社維法或道交條例）。協助蒐證。
        - listitem [ref=e2730]:
          - strong [ref=e2731]: 處理禁忌
          - text: ：嚴禁言語羞辱、暴力驅趕、潑水或擅自丟棄其個人財物。
      - heading "2.4 高溫關懷" [level=3] [ref=e2732]
      - list [ref=e2733]:
        - listitem [ref=e2734]:
          - strong [ref=e2735]: 背景
          - text: ：源於 2025 年「臺北市氣候行動獎」，將「主動關懷脆弱族群」納入社會韌性策略。
        - listitem [ref=e2736]:
          - strong [ref=e2737]: 執行原因
          - text: ：極端高溫對長者（尤其是獨居者）有致命風險（熱衰竭/熱中暑）。總幹事是唯一的外部干預防線。
      - heading "2.4.1 自動提醒系統（不必自己盯氣象）" [level=4] [ref=e2738]
      - paragraph [ref=e2739]:
        - text: 為避免漏接，社區後台每天 17:00 自動讀取中央氣象署資料，達條件時在 culturalcity85 日曆建立全天事件。
        - strong [ref=e2740]: 總幹事只需要每天打開日曆
        - text: ，看到下列任一事件即啟動 SOP：
      - document [ref=e2742]:
        - generic [ref=e2744]:
          - generic [ref=e2752]:
            - generic [ref=e2756]: 是
            - generic [ref=e2760]: 是
            - generic [ref=e2764]: 否
            - generic [ref=e2768]: 否
          - generic [ref=e2769]:
            - generic [ref=e2775]:
              - text: CWA 高溫資訊 API
              - text: 每天 17:00 抓
            - generic [ref=e2780]: 台北是否有黃/橘/紅燈?
            - generic [ref=e2785]: CWA 大安區預報
            - generic [ref=e2790]: 明日最高溫 ≥ 36°C?
            - generic [ref=e2796]:
              - text: ⚠️ CWA 高溫警報
              - text: 紅色全天事件
              - text: 必須關懷
            - generic [ref=e2802]:
              - text: 🌡️ 預報高溫
              - text: 橘色全天事件
              - text: 建議關懷
            - generic [ref=e2807]: 不建事件
      - paragraph [ref=e2808]: 兩種事件意義不同：
      - table [ref=e2809]:
        - rowgroup [ref=e2810]:
          - row "事件 顏色 何時出現 意義 SOP" [ref=e2811]:
            - columnheader "事件" [ref=e2812]
            - columnheader "顏色" [ref=e2813]
            - columnheader "何時出現" [ref=e2814]
            - columnheader "意義" [ref=e2815]
            - columnheader "SOP" [ref=e2816]
        - rowgroup [ref=e2817]:
          - row "⚠️ CWA 高溫警報・必須關懷獨居長者 紅色（Tomato） CWA 正式發布警報當天 中央氣象署官方認定的高溫日；對應氣候行動獎審核標準 當天下午 3 點前完成全冊電話關懷" [ref=e2818]:
            - cell "⚠️ CWA 高溫警報・必須關懷獨居長者" [ref=e2819]:
              - strong [ref=e2820]: ⚠️ CWA 高溫警報・必須關懷獨居長者
            - cell "紅色（Tomato）" [ref=e2821]
            - cell "CWA 正式發布警報當天" [ref=e2822]
            - cell "中央氣象署官方認定的高溫日；對應氣候行動獎審核標準" [ref=e2823]
            - cell "當天下午 3 點前完成全冊電話關懷" [ref=e2824]:
              - strong [ref=e2825]: 當天下午 3 點前完成
              - text: 全冊電話關懷
          - row "🌡️ 預報高溫・建議關懷獨居長者（明日 X°C） 橘色（Tangerine） 前一晚 17:00 出現於隔日 預報達黃燈門檻、明天 CWA 很可能正式發布；社區主動提前一晚 今晚先安排明天時段，明天視 CWA 實際發布決定是否升級為必須關懷" [ref=e2826]:
            - cell "🌡️ 預報高溫・建議關懷獨居長者（明日 X°C）" [ref=e2827]:
              - strong [ref=e2828]: 🌡️ 預報高溫・建議關懷獨居長者（明日 X°C）
            - cell "橘色（Tangerine）" [ref=e2829]
            - cell "前一晚 17:00 出現於隔日" [ref=e2830]
            - cell "預報達黃燈門檻、明天 CWA 很可能正式發布；社區主動提前一晚" [ref=e2831]
            - cell "今晚先安排明天時段，明天視 CWA 實際發布決定是否升級為必須關懷" [ref=e2832]:
              - strong [ref=e2833]: 今晚先安排明天時段
              - text: ，明天視 CWA 實際發布決定是否升級為必須關懷
      - paragraph [ref=e2834]: 兩者可能同日出現（先有橘色預報、隔天 CWA 發布變紅色警報）。看到紅色就以紅色 SOP 為準。
      - heading "2.4.2 執行 SOP" [level=4] [ref=e2835]
      - list [ref=e2836]:
        - listitem [ref=e2837]:
          - strong [ref=e2838]: 對象
          - text: ：
          - strong [ref=e2839]: 65 歲以上獨居者
          - text: 、行動不便獨居者、日間無人照顧者。
        - listitem [ref=e2840]:
          - strong [ref=e2841]: 名冊建立
          - text: ：採「自願登記制」，建立「閱大安 安心關懷名冊」，絕對保密。
        - listitem [ref=e2842]:
          - strong [ref=e2843]: 執行動作
          - text: ：
          - list [ref=e2844]:
            - listitem [ref=e2845]:
              - text: 看到紅色 ⚠️ 事件：
              - strong [ref=e2846]: 當天下午 3 點前
              - text: 完成全冊電話關懷
            - listitem [ref=e2847]: 看到橘色 🌡️ 事件：當晚先排好隔天的訪視時段；隔天打開日曆若升級為紅色，按紅色 SOP 執行
        - listitem [ref=e2848]:
          - strong [ref=e2849]: 話術
          - text: ：「X 先生/小姐您好，這裡是管理中心，今天天氣非常熱，提醒您多補水、開冷氣、盡量別出門，有不舒服請立刻通知我們。」
        - listitem [ref=e2850]:
          - strong [ref=e2851]: 紀錄
          - text: ：完成關懷後在該日曆事件加上一行 comment（譬如「2026-05-21 14:30 完成全 5 位電話關懷，X 阿嬤無人接聽已通報緊急聯絡人」），作為氣候行動獎稽核佐證。
      - heading "2.4.3 系統壞掉時的備援" [level=4] [ref=e2852]
      - paragraph [ref=e2853]: 自動提醒不是百分百保險，偶爾會碰到這兩種狀況：
      - list [ref=e2854]:
        - listitem [ref=e2855]: 連續幾天日曆都沒出現任何相關事件（系統可能卡住沒在跑）
        - listitem [ref=e2856]: 氣象署明明發了警報、但日曆當天卻沒跳事件（資料抓取出問題）
      - paragraph [ref=e2857]: 碰到時的處理：
      - list [ref=e2858]:
        - listitem [ref=e2859]:
          - strong [ref=e2860]: 以氣象署官網為準手動執行關懷
          - text: ：到
          - link "https://www.cwa.gov.tw" [ref=e2861] [cursor=pointer]:
            - /url: https://www.cwa.gov.tw
          - text: 點「高溫資訊」頁，自己確認台北是否在警報範圍。有的話照 §2.4.2 SOP 完成電話關懷，不用等系統。
        - listitem [ref=e2862]:
          - strong [ref=e2863]: 回報主委
          - text: ：把狀況（譬如「2026-07-15 氣象署發黃燈但日曆當天沒事件」）傳給主委，由主委檢查自動化系統哪裡出問題、安排修復。
      - paragraph [ref=e2864]:
        - strong [ref=e2865]: 重要心態
        - text: ：系統只是用來減少漏接的輔助工具，
        - strong [ref=e2866]: 真正的責任仍在總幹事
        - text: 。氣候行動獎審核看的是實際關懷紀錄，
        - strong [ref=e2867]: 不能用「系統當天沒提醒」當作沒做的理由
        - text: 。把它想成「鬧鐘」——鬧鐘壞了人還是要自己起床。
      - heading "第六章：重點議題與住戶關係" [level=1] [ref=e2868]
      - heading "1. 會議與議題管理" [level=2] [ref=e2869]
      - heading "1.1 會議記錄與追蹤" [level=3] [ref=e2870]
      - list [ref=e2871]:
        - listitem [ref=e2872]:
          - strong [ref=e2873]: 會議記錄
          - text: ：需完整歸檔並熟悉歷屆管委會、區權會等會議記錄，以利查閱歷史決策。
        - listitem [ref=e2874]:
          - strong [ref=e2875]: 議題追蹤
          - text: ：需掌握近期重要議題、決議要點，並持續追蹤「未決議」或「待執行」事項的進度。
        - listitem [ref=e2876]:
          - strong [ref=e2877]: 住戶提案
          - text: ：需記錄並跟進住戶的提案計畫，定期回報管委會。
      - heading "2. 住戶關係管理" [level=2] [ref=e2878]
      - heading "2.0 對住戶的溝通語氣原則" [level=3] [ref=e2879]
      - paragraph [ref=e2880]:
        - text: 閱大安管委會的姿態是「主席帶領住戶共同決定」
        - strong [ref=e2881]: 而非「向住戶宣布」
        - text: 。所有對住戶溝通的文字（公告、月報、AGM 簡報、Line 訊息）都要反映這個姿態。下面是禁區詞與替換建議：
      - table [ref=e2882]:
        - rowgroup [ref=e2883]:
          - row "禁區詞 改用 理由" [ref=e2884]:
            - columnheader "禁區詞" [ref=e2885]
            - columnheader "改用" [ref=e2886]
            - columnheader "理由" [ref=e2887]
        - rowgroup [ref=e2888]:
          - row "告知 提前意見交流、徵詢、預告 「告知」是行政機關下行公文的詞，不是社區自治的詞" [ref=e2889]:
            - cell "告知" [ref=e2890]
            - cell "提前意見交流、徵詢、預告" [ref=e2891]
            - cell "「告知」是行政機關下行公文的詞，不是社區自治的詞" [ref=e2892]
          - row "宣告 / 通知您 邀請、歡迎、討論 同上" [ref=e2893]:
            - cell "宣告 / 通知您" [ref=e2894]
            - cell "邀請、歡迎、討論" [ref=e2895]
            - cell "同上" [ref=e2896]
          - row "表決 議決 「議決」更貼近社區自治語境" [ref=e2897]:
            - cell "表決" [ref=e2898]
            - cell "議決" [ref=e2899]:
              - strong [ref=e2900]: 議決
            - cell "「議決」更貼近社區自治語境" [ref=e2901]
          - row "「請住戶……」 「邀請住戶……」「歡迎住戶……」 主語從命令轉為邀約" [ref=e2902]:
            - cell "「請住戶……」" [ref=e2903]
            - cell "「邀請住戶……」「歡迎住戶……」" [ref=e2904]
            - cell "主語從命令轉為邀約" [ref=e2905]
          - row "口徑 實際/推估、比較基礎 「口徑」是內部術語，住戶聽不懂" [ref=e2906]:
            - cell "口徑" [ref=e2907]
            - cell "實際/推估、比較基礎" [ref=e2908]
            - cell "「口徑」是內部術語，住戶聽不懂" [ref=e2909]
      - paragraph [ref=e2910]:
        - strong [ref=e2911]: 自我檢查問題
        - text: ：寫完一句後問「這句話讓住戶覺得自己是參與者還是接收者？」——應該感覺是前者。
      - paragraph [ref=e2912]:
        - strong [ref=e2913]: 為什麼這個原則重要
        - text: ：第五屆 AGM 準備過程中，主委在簡報內三處主動把「告知」改成「提前意見交流」。沿用過去文字時要審視語氣對不對，不是只看文字對不對。
      - paragraph [ref=e2914]:
        - strong [ref=e2915]: 自擬規則的標示原則
        - text: ：如果某個閾值/公式/判斷規則是管委會憑經驗或直覺擬的（無外部依據），要主動標示「這是我們社區的內部慣例」，
        - strong [ref=e2916]: 不要包裝成「業界標準」「規範要求」
        - text: ——否則被住戶質疑時無法辯護。
      - heading "2.1 外送服務管理原則" [level=3] [ref=e2917]
      - list [ref=e2918]:
        - listitem [ref=e2919]:
          - strong [ref=e2920]: 管理原則
          - text: ：
          - list [ref=e2921]:
            - listitem [ref=e2922]:
              - text: 為維護社區安全、隱私與管理秩序，原則上
              - strong [ref=e2923]: 禁止
              - text: 餐飲、快遞等外送人員「單獨」進入住戶樓層。
            - listitem [ref=e2924]: 住戶需自行至一樓大廳或管理中心領取。
        - listitem [ref=e2925]:
          - strong [ref=e2926]: 例外情況（大型重物配送）
          - text: ：
          - list [ref=e2927]:
            - listitem [ref=e2928]:
              - strong [ref=e2929]: 適用範圍
              - text: ：僅限大型生鮮食品、箱裝乾糧（如家樂福、大潤發、COSTCO 線上購物）等重物，且廠商提供送貨到府服務者。
            - listitem [ref=e2930]:
              - strong [ref=e2931]: SOP
              - text: ：
              - list [ref=e2932]:
                - listitem [ref=e2933]:
                  - strong [ref=e2934]: 確認
                  - text: ：送貨員抵達表明為特定住戶送重物。
                - listitem [ref=e2935]:
                  - strong [ref=e2936]: 聯繫
                  - text: ：管理中心致電住戶確認在家。
                - listitem [ref=e2937]:
                  - strong [ref=e2938]: 執行（關鍵）
                  - text: ：明確告知住戶，依決議需
                  - strong [ref=e2939]: 請住戶親自下樓至大廳，接待並「陪同」送貨人員上樓
                  - text: 。
                - listitem [ref=e2940]:
                  - strong [ref=e2941]: 登記
                  - text: ：保全仍需對送貨員進行訪客登記。
        - listitem [ref=e2942]:
          - strong [ref=e2943]: 決策理由
          - text: ：
          - list [ref=e2944]:
            - listitem [ref=e2945]:
              - strong [ref=e2946]: 安全與隱私
              - text: ：降低陌生人遊蕩風險。
            - listitem [ref=e2947]:
              - strong [ref=e2948]: 成本管控
              - text: ：減少管理人員頻繁換證的負擔。
            - listitem [ref=e2949]:
              - strong [ref=e2950]: 秩序維護
              - text: ：避免用餐尖峰時刻電梯被外送員佔用。
      - heading "2.2 頂樓空中花園禁止曬衣" [level=3] [ref=e2951]
      - list [ref=e2952]:
        - listitem [ref=e2953]:
          - strong [ref=e2954]: 管理原則
          - text: ：全面
          - strong [ref=e2955]: 禁止
          - text: 在頂樓空中花園等公共可視區域晾曬任何衣物、被單。
        - listitem [ref=e2956]:
          - strong [ref=e2957]: 主要理由
          - text: ：
          - list [ref=e2958]:
            - listitem [ref=e2959]:
              - strong [ref=e2960]: 形象資產
              - text: ：頂樓花園為重要公設，萬國旗般的衣物會嚴重破壞設計感與房價基礎。
            - listitem [ref=e2961]:
              - strong [ref=e2962]: 糾紛預防
              - text: ：避免空間佔用糾紛、物品遺失責任不清。
            - listitem [ref=e2963]:
              - strong [ref=e2964]: 公共安全
              - text: ：避免衣物滴水造成地滑，或被強風吹落砸傷人車。
        - listitem [ref=e2965]:
          - strong [ref=e2966]: 執行 SOP
          - text: ：
          - list [ref=e2967]:
            - listitem [ref=e2968]:
              - strong [ref=e2969]: 巡檢
              - text: ：列入日常巡邏動線。
            - listitem [ref=e2970]:
              - strong [ref=e2971]: 勸導
              - text: ：發現時溫和勸導（參考話術：維護社區景觀，麻煩收一下）。
            - listitem [ref=e2972]:
              - strong [ref=e2973]: 開罰
              - text: ：屢勸不聽者拍照存證，依規約開立違規通知單。
      - heading "2.3 一樓閱覽室電視使用管理" [level=3] [ref=e2974]
      - list [ref=e2975]:
        - listitem [ref=e2976]:
          - strong [ref=e2977]: 管理原則
          - text: ：一樓閱覽室 65 吋電視，僅限
          - strong [ref=e2978]: 管委會開會
          - text: 或
          - strong [ref=e2979]: 經核准的社區活動
          - text: 使用，
          - strong [ref=e2980]: 不對外開放
          - text: 給住戶個人觀看節目。
        - listitem [ref=e2981]:
          - strong [ref=e2982]: 主要理由
          - text: ：
          - list [ref=e2983]:
            - listitem [ref=e2984]:
              - strong [ref=e2985]: 功能衝突
              - text: ：閱覽室核心為「安靜閱讀」，電視聲光會破壞此功能。
            - listitem [ref=e2986]:
              - strong [ref=e2987]: 爭議預防
              - text: ：避免「遙控器戰爭」（搶頻道）及長時間佔用問題。
            - listitem [ref=e2988]:
              - strong [ref=e2989]: 成本考量
              - text: ：減少電費與設備損耗。
        - listitem [ref=e2990]:
          - strong [ref=e2991]: 執行 SOP
          - text: ：
          - list [ref=e2992]:
            - listitem [ref=e2993]:
              - strong [ref=e2994]: 應對提案
              - text: ：若住戶建議開放，請禮貌說明上述原則（保護安靜功能）。
            - listitem [ref=e2995]:
              - strong [ref=e2996]: 違規處理
              - text: ：發現私自使用者，上前溫和勸導並請其關閉；無效則回報管委會。
      - heading "3. 社區活動" [level=2] [ref=e2997]
      - heading "3.1 中元普渡" [level=3] [ref=e2998]
      - list [ref=e2999]:
        - listitem [ref=e3000]:
          - strong [ref=e3001]: 活動背景
          - text: ：每年約 10 戶住戶共同參與，具凝聚力。亦會收到信義房屋、永慶房屋等外部贊助。
        - listitem [ref=e3002]:
          - strong [ref=e3003]: 籌備事項清單
          - text: ：
          - list [ref=e3004]:
            - listitem [ref=e3005]:
              - strong [ref=e3006]: 預算
              - text: ：管委會供品採購預算為
              - strong [ref=e3007]: 3,000 元
              - text: 。
            - listitem [ref=e3008]:
              - strong [ref=e3009]: 採購原則
              - text: ：以零食、水果為主；
              - strong [ref=e3010]: 不採購
              - text: 鮮花、牲禮（難處理）。
            - listitem [ref=e3011]:
              - strong [ref=e3012]: 普渡旗
              - text: ：剩餘旗幟應填上當屆委員姓名。
            - listitem [ref=e3013]:
              - strong [ref=e3014]: 物資
              - text: ：供桌使用健身房折疊桌；需區分兩個金爐（普渡公 vs 好兄弟）。
            - listitem [ref=e3015]:
              - strong [ref=e3016]: 雨天備案
              - text: ：可向一樓永慶房屋借用帳棚（需提前預約，2025 年已預約 2026 年農曆七月第一個週六）。
            - listitem [ref=e3017]:
              - strong [ref=e3018]: 路權
              - text: ：若佔用人行道需提前申請。
        - listitem [ref=e3019]:
          - strong [ref=e3020]: 祭文內容範本
          - text: ：
          - list [ref=e3021]:
            - listitem [ref=e3022]:
              - paragraph [ref=e3023]:
                - strong [ref=e3024]: 祝禱疏文（恭請普渡公）
                - text: ：
              - blockquote [ref=e3025]:
                - paragraph [ref=e3026]: 閱大安（恭請普渡公） 值逢七月普渡，位於臺北市大安區羅斯福路二段83至85號閱大安社區全體住戶，一心虔誠慶贊中元，虔誠敬備供品，供養十方孤魂有情眾。特先恭請普渡公駕臨主持中元普渡慶贊儀式，祈求保護社區安寧、平安、儀式順利。 閱大安主任委員○○○率全體住戶恭請 歲次國曆○○○年○月○日 / 農曆○○年○月○日
            - listitem [ref=e3027]:
              - paragraph [ref=e3028]:
                - strong [ref=e3029]: 普渡文（供養及恭送好兄弟）
                - text: ：
              - blockquote [ref=e3030]:
                - paragraph [ref=e3031]: 閱大安（供養及恭送好兄弟） 值逢七月普渡，位於臺北市大安區羅斯福路二段83至85號閱大安社區全體住戶，虔誠敬備供品，供養十方孤魂好兄弟姊妹有情眾，請受全體住戶供養納受，並祈求保護住戶身體健康、家旺人和、出入平安。社區國泰民安、風調雨順，以此敬請受供。獻金各得其後，恭送各歸本位。 閱大安主任委員○○○率全體住戶供養及恭送 歲次國曆○○○年○月○日 / 農曆○○年○月○日
      - heading "3.2 農曆新年期間管理" [level=3] [ref=e3032]
      - paragraph [ref=e3033]: 每年農曆春節前 1-2 週決定年節安排。
      - heading "3.2.1 標準公告內容（112 年起穩定版本）" [level=4] [ref=e3034]
      - code [ref=e3036]: 春節期間禁止任何裝修工程。 為避免社區環境髒亂，環保室將暫時關閉上鎖： - 關閉時間：除夕中午 12:00 - 重新開放時間：初三中午 12:00 如有需丟棄大型家具請提前告知管理中心，聯絡台北市政府環保局清潔隊收取。 長時間外出住戶請留意家中電器及安全設定。
      - heading "3.2.2 值勤人員配置" [level=4] [ref=e3037]
      - paragraph [ref=e3038]: 需於管委會議決定當年值勤輪班；通常以日班保全為主，夜班可輪替。
      - heading "4. 鄰里關係管理" [level=2] [ref=e3039]
      - heading "4.1 五府宮互動原則" [level=3] [ref=e3040]
      - list [ref=e3041]:
        - listitem [ref=e3042]:
          - strong [ref=e3043]: 背景
          - text: ：位於社區後門，因地緣關係互動頻繁。
        - listitem [ref=e3044]:
          - strong [ref=e3045]: 過往困擾
          - text: ：
          - list [ref=e3046]:
            - listitem [ref=e3047]: 人潮與空間佔用（曾移開拒馬佔用身障車位）。
            - listitem [ref=e3048]: 焚燒紙錢造成空污（有時是隔壁鄰居拿去燒的，廟方背鍋）。
            - listitem [ref=e3049]: 普渡供桌曾佔用地下室出入口旁花圃。
        - listitem [ref=e3050]:
          - strong [ref=e3051]: 目前策略
          - text: ：
          - list [ref=e3052]:
            - listitem [ref=e3053]:
              - strong [ref=e3054]: 溝通管道
              - text: ：主委已與廟方窗口
              - strong [ref=e3055]: 李潔西小姐
              - text: （宮主姪女）建立 Line 聯繫。
            - listitem [ref=e3056]:
              - strong [ref=e3057]: 要求
              - text: ：舉辦活動前需先知會閱大安。
            - listitem [ref=e3058]:
              - strong [ref=e3059]: 立場
              - text: ：向廟方強調本棟已非私宅，而是區分所有權住宅，需維護住戶權益。
        - listitem [ref=e3060]:
          - strong [ref=e3061]: 改善現況
          - text: ：大型活動頻率減少；李小姐有意願推動減燒紙錢（但受長輩壓力無法即刻禁絕）。
        - listitem [ref=e3062]:
          - strong [ref=e3063]: 關鍵人物
          - text: ：李潔西小姐家人曾任其他大樓主委，對社區立場具同理心，是溝通關鍵。
      - heading "5. 電動車充電系統營運與管理" [level=2] [ref=e3064]
      - heading "5.1 基礎設施與產權定義" [level=3] [ref=e3065]
      - list [ref=e3066]:
        - listitem [ref=e3067]:
          - strong [ref=e3068]: 系統架構
          - text: ：採用「專設一戶」供電，與大公電及住戶家用電實體隔離。
        - listitem [ref=e3069]:
          - strong [ref=e3070]: 迴路配置
          - text: ：
          - list [ref=e3071]:
            - listitem [ref=e3072]:
              - strong [ref=e3073]: B1+B2 迴路
              - text: ：
              - list [ref=e3074]:
                - listitem [ref=e3075]: 獨立電表（表燈 - 非時間電價）。
                - listitem [ref=e3076]: 現況：每月充電度數未達 800 度。
            - listitem [ref=e3077]:
              - strong [ref=e3078]: B3+B4 迴路
              - text: ：
              - list [ref=e3079]:
                - listitem [ref=e3080]: 獨立電表（表燈 - 簡易型時間電價/二段式）。
                - listitem [ref=e3081]: 現況：每月已達 800 度。
                - listitem [ref=e3082]:
                  - strong [ref=e3083]: 優勢
                  - text: ：
                  - strong [ref=e3084]: 無契約容量
                  - text: （無超約罰款風險）；離峰時段（夜間/週末）單價低（約 1.99 元）。
        - listitem [ref=e3085]:
          - strong [ref=e3086]: 管理中樞
          - text: ：台達電 (Delta) EMS 能源管理系統。
        - listitem [ref=e3087]:
          - strong [ref=e3088]: 設備現況
          - text: ：全區 49 車位，已安裝 33 支，常態使用約 4 支。
        - listitem [ref=e3089]:
          - strong [ref=e3090]: 產權界定
          - text: ：
          - list [ref=e3091]:
            - listitem [ref=e3092]:
              - strong [ref=e3093]: 私有
              - text: ：充電樁本體、公共線槽至樁體之線路。
            - listitem [ref=e3094]:
              - strong [ref=e3095]: 公設
              - text: ：公共線路、EMS 主機。
      - heading "5.2 設備養護" [level=3] [ref=e3096]
      - list [ref=e3097]:
        - listitem [ref=e3098]:
          - strong [ref=e3099]: 防潮管理
          - text: ：因地下室濕氣重，採「待機通電」原則，利用設備微熱驅除濕氣，防止電路板鏽蝕。
      - heading "5.3 財務收支流程" [level=3] [ref=e3100]
      - list [ref=e3101]:
        - listitem [ref=e3102]:
          - strong [ref=e3103]: 代墊代收制
          - text: ：
          - list [ref=e3104]:
            - listitem [ref=e3105]:
              - strong [ref=e3106]: 支付
              - text: ：管委會收到台電帳單，先以管理費代墊。
            - listitem [ref=e3107]:
              - strong [ref=e3108]: 拆算
              - text: ：總幹事登入 EMS 後台匯出報表。
            - listitem [ref=e3109]:
              - strong [ref=e3110]: 收費
              - text: ：依金額向車主收費（或併入管理費）。
            - listitem [ref=e3111]:
              - strong [ref=e3112]: 歸墊
              - text: ：款項回補管理費。
        - listitem [ref=e3113]:
          - strong [ref=e3114]: 公用電費分攤
          - text: ：EMS 主機及線損產生之費用，由全體充電樁持有者均攤。
        - listitem [ref=e3115]:
          - strong [ref=e3116]: 維護基金
          - text: ：充電樁住戶每月繳
          - strong [ref=e3117]: 50 元
          - text: ，存入「充電樁線路維護費帳戶」（永豐東門分行），專款專用。
      - heading "5.4 風險管理" [level=3] [ref=e3118]
      - list [ref=e3119]:
        - listitem [ref=e3120]:
          - strong [ref=e3121]: 保險
          - text: ：商業火險承保範圍需確認涵蓋 EMS 主機、伺服器及公共配電盤。
        - listitem [ref=e3122]:
          - strong [ref=e3123]: 緊急應變
          - text: ：EMS 當機不影響大樓供電安全，僅無法計費。
      - heading "5.5 綠能評估 (風力發電可行性報告)" [level=3] [ref=e3124]
      - list [ref=e3125]:
        - listitem [ref=e3126]:
          - strong [ref=e3127]: 評估緣起
          - text: ：第四屆管委會為爭取氣候行動獎，諮詢「元皓能源」並參考「新北市菠爾社區」案例。
        - listitem [ref=e3128]:
          - strong [ref=e3129]: 先天限制 (微氣候)
          - text: ：
          - list [ref=e3130]:
            - listitem [ref=e3131]: 雖鄰師大操場有局部通風，但受盆地與高樓影響，風場屬「高紊流」陣風，缺乏發電所需的「穩定層流」。
            - listitem [ref=e3132]:
              - text: 市區風速低，發電量可忽略，
              - strong [ref=e3133]: 回本年限超過設備壽命 (>20年)
              - text: 。
        - listitem [ref=e3134]:
          - strong [ref=e3135]: 法規阻礙
          - text: ：
          - list [ref=e3136]:
            - listitem [ref=e3137]: 需申請「雜項執照」（涉及建築師、結構技師簽證）。
            - listitem [ref=e3138]: 廠商反饋：近七年雙北幾無成功合法案例，行政成本過高。
            - listitem [ref=e3139]: 補助看得到吃不到（卡在結構簽證）。
        - listitem [ref=e3140]:
          - strong [ref=e3141]: 結構與安全疑慮
          - text: ：
          - list [ref=e3142]:
            - listitem [ref=e3143]:
              - strong [ref=e3144]: 載重
              - text: ：旋轉震動長期影響樑柱，需高成本補強。
            - listitem [ref=e3145]:
              - strong [ref=e3146]: 噪音
              - text: ：低頻噪音難消，頂樓住戶投訴風險高。
            - listitem [ref=e3147]:
              - strong [ref=e3148]: 風險
              - text: ：颱風強風恐致葉片斷裂。
        - listitem [ref=e3149]:
          - strong [ref=e3150]: 最終決策
          - text: ：
          - strong [ref=e3151]: 不予執行
          - text: 。
      - heading "6. 特殊案例與歷史沿革" [level=2] [ref=e3152]
      - heading "6.1 頂樓平台照明演變" [level=3] [ref=e3153]
      - list [ref=e3154]:
        - listitem [ref=e3155]:
          - strong [ref=e3156]: 過程
          - text: ：從早期的「太陽能燈」（效果不佳）演變至目前的「拉明線手動開關」。
        - listitem [ref=e3157]:
          - strong [ref=e3158]: 操作
          - text: ：提醒保全夜間巡邏時需手動開啟。
      - heading "6.2 夏日防蚊措施" [level=3] [ref=e3159]
      - list [ref=e3160]:
        - listitem [ref=e3161]:
          - strong [ref=e3162]: 依據
          - text: ：第二屆管委會決議。
        - listitem [ref=e3163]:
          - strong [ref=e3164]: 成效
          - text: ：有些許成效。
        - listitem [ref=e3165]:
          - strong [ref=e3166]: 措施
          - text: ：
          - list [ref=e3167]:
            - listitem [ref=e3168]:
              - strong [ref=e3169]: 阻絕路徑
              - text: ：蚊子多從二樓防火門進入電梯，故要求
              - strong [ref=e3170]: 二樓防火門
              - text: 與
              - strong [ref=e3171]: 一樓後門
              - text: 常時保持關閉。
            - listitem [ref=e3172]:
              - strong [ref=e3173]: 藥劑
              - text: ：於電梯內黏貼防蚊片、外圍排水溝投放氯錠。
      - heading "6.3 飲水機用水習慣" [level=3] [ref=e3174]
      - list [ref=e3175]:
        - listitem [ref=e3176]:
          - strong [ref=e3177]: 觀察
          - text: ：物業同仁因「環境心理學」因素不願飲用公設飲水機。此細節可作為未來改善設施之參考。
