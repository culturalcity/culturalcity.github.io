name: Fetch Weather Retry (safety net)

# deploy.yml 的 Fetch daily weather (CODiS) 步驟若連 210.69.218.23 失敗
# （ETIMEDOUT 或 5xx），整個 build 就 fail、當天高低溫永久缺漏。
# 這隻 workflow 是備援：白天再跑兩次補抓昨日資料，缺什麼就補什麼。
#
# fetch-weather.js 本身是 idempotent（已存在的天不會覆寫），多跑幾次無害。
# 如果該抓的天都齊了，commit 步驟會跳過、不會留垃圾 commit。
#
# 排程：只在「早上時段」每 30 分鐘一次（昨日資料只在早上落地，下午/半夜空轉沒意義）。
# UTC 22:00-05:59 = 台北 06:00-13:59，約 16 次/天（含 GitHub 排程慣性延遲仍涵蓋）。
# fetch-weather.js 已存在天不會覆寫，沒新資料時 commit 步驟會 skip。
#
# 不 build、不需任何 npm 套件（fetch-weather.js 只用 fs/path/https 內建），故不跑 npm ci，
# 以節省 Actions 用量（為日後 repo 轉私有計量預作準備；正班 deploy.yml 仍照常跑、不受影響）。

on:
  schedule:
    - cron: '*/30 22-23,0-5 * * *'   # UTC 22-05 = 台北 06:00-13:59 早上時段
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-weather-retry
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Fetch daily weather (CODiS)
        run: node scripts/fetch-weather.js

      - name: Commit data updates if changed
        run: |
          changed=()
          for f in daily-temp:氣溫 daily-rain:降雨; do
            name=${f%%:*}; label=${f##*:}
            path="utility/data/${name}.json"
            [ -f "$path" ] || continue
            git add "$path"
            if ! git diff --cached --quiet "$path"; then
              changed+=("$label")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No new weather data, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            msg="data: 每日$(IFS=/; printf '%s' "${changed[*]}")更新（retry 補抓）"
            git commit -m "$msg"
            git push
          fi
