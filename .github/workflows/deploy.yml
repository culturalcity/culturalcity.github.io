name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每天 22:00 UTC = 台北 06:00
    # 過去 5 次觀察：實際觸發落在 22:51~23:00 UTC（台北 06:51~07:00），
    # GitHub Actions schedule 對這 repo 持續 51-60 min 延遲——是常態不是 bug。
    # CODiS 在那個時段就 settle 完了（4/5 成功率，唯一失敗的 5/4 是 CODiS
    # 偶發、跟時間無關）。
    # ⚠️ 不要再隨意改 cron 時間：每次改都會被 GitHub 跳過下一次觸發
    #    （事故日期 2026-05-05、2026-05-06）。靜默失敗的告警靠 fetch-weather.js
    #    的「昨日缺值即 exit 1」機制，不靠調 cron。
    - cron: '0 22 * * *'

permissions:
  contents: write   # 排程時 fetch-weather 需要 push 更新
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 排程或手動觸發時，先抓昨日氣象資料（push 觸發時跳過）
      - name: Fetch daily weather (CODiS)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-weather.js

      # 把 KV 的每日水電手填資料落地進 git（floating → 有版本備份）。
      # fetch-kv 抓失敗/401/格式不符會自動跳過、保留舊備份，不讓部署失敗。
      # 需 repo secret：YDA_DATA_TOKEN（總幹事 cookie token，見 raw/cloudflare-worker 底稿的 TOKENS）。
      - name: Bake KV utility data into git
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          YDA_DATA_TOKEN: ${{ secrets.YDA_DATA_TOKEN }}
        run: |
          node scripts/fetch-kv.js
          node scripts/extract-daily-elec.js
          node scripts/extract-daily-water.js

      - name: Commit data updates if changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          changed=()
          for f in daily-temp:氣溫 daily-rain:降雨 daily-elec:用電 daily-water:用水 kv-snapshot:水電備份; do
            name=${f%%:*}; label=${f##*:}
            path="utility/data/${name}.json"
            [ -f "$path" ] || continue
            git add "$path"
            if ! git diff --cached --quiet "$path"; then
              changed+=("$label")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No new weather data, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            msg="data: 每日資料自動更新（$(IFS=/; printf '%s' "${changed[*]}")）"
            git commit -m "$msg"
            git push
          fi

      - name: Build with 11ty
        run: npx @11ty/eleventy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
