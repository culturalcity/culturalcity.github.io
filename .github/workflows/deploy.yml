name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每天 01:00 UTC = 台北時間 09:00
    # CODiS 「日 Max/Min」aggregate batch 約在台北 07:00~09:00 之間才完成；
    # 06:00 跑會抓到「日期有但 tmax/tmin 是 null」的不完整資料而靜默跳過。
    # 09:00 已實證 settle 完畢（事故日期 2026-05-04）。
    - cron: '0 1 * * *'

permissions:
  contents: write   # 排程時 fetch-weather 需要 push 更新
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 排程或手動觸發時，先抓昨日氣象資料（push 觸發時跳過）
      - name: Fetch daily weather (CODiS)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-weather.js

      - name: Commit data updates if changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          changed=()
          for f in daily-temp:氣溫 daily-rain:降雨; do
            name=${f%%:*}; label=${f##*:}
            path="utility/data/${name}.json"
            [ -f "$path" ] || continue
            git add "$path"
            if ! git diff --cached --quiet "$path"; then
              changed+=("$label")
            fi
          done
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No new weather data, skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            msg="data: 每日$(IFS=/; printf '%s' "${changed[*]}")更新（CODiS 自動）"
            git commit -m "$msg"
            git push
          fi

      - name: Build with 11ty
        run: npx @11ty/eleventy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
