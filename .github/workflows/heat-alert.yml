name: Heat Alert (CWA → Google Calendar)

# 每天 17:00 台北：抓 CWA 高溫警報（W-C0033-005）+ 大安區明日預報（F-D0047-061），
# 觸發條件達標就 POST 到 Apps Script bridge，建立 culturalcity85 Calendar 全天事件。
#
# 為什麼獨立 workflow（不併進 deploy.yml）：
#   1. heat-alert 不 commit 任何檔，不需要走 Pages build/deploy
#   2. 改 deploy.yml 的 cron 會讓下一次觸發被 GitHub 跳過（事故 2026-05-05、2026-05-06）；
#      獨立 workflow 不影響 fetch-weather 的排程穩定性
#
# 排程觀察：GitHub Actions schedule 對這個 repo 持續延遲 51-60 min（記在 deploy.yml 註解）。
# 用 09:00 UTC 對應台北 17:00，實際觸發落在 17:51~18:00。對「明日提醒」場景沒差。

on:
  schedule:
    - cron: '0 9 * * *'   # UTC 09:00 = 台北 17:00
  workflow_dispatch:       # 允許手動觸發測試

permissions:
  contents: read

concurrency:
  group: heat-alert
  cancel-in-progress: false

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run heat alert check
        env:
          CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
          APPS_SCRIPT_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}
          APPS_SCRIPT_SHARED_SECRET: ${{ secrets.APPS_SCRIPT_SHARED_SECRET }}
        run: node scripts/check-heat-alert.js
