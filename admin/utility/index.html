<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>閱大安每日水電公告</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{--wg1:#EAE7E1;--wg9:#898480;--wg11:#696460;--wg41:#3C3835;--white:#F7F5F2;--line:rgba(60,56,53,0.12);--radius:2px;--dp:#1F5C38;--dn:#8C1F1F;--blue:#2B4A6B;--warn:#8C5A00;--yellow:#FFF9D9;--ts-xs:13px;--ts-sm:15px;--ts-base:17px;--ts-md:19px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--wg1);color:var(--wg41);font-size:var(--ts-base);line-height:1.65;min-height:100vh;}

/* ── Header ────────────────────────────────────── */
.hd{background:var(--wg41);color:var(--wg1);padding:18px 26px 14px;border-bottom:2px solid var(--wg11);position:relative;overflow:hidden;}
.hd::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(92deg,transparent,transparent 120px,rgba(234,231,225,0.03) 120px,rgba(234,231,225,0.03) 121px);pointer-events:none;}
.hi{max-width:1600px;margin:0 auto;position:relative;}
.hle{font-size:11px;letter-spacing:.28em;color:var(--wg9);margin-bottom:3px;}
.hlh{font-size:21px;font-weight:700;letter-spacing:.06em;}
.hsb{font-size:13px;color:var(--wg9);letter-spacing:.14em;margin-top:4px;}
.hbn{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:10px;font-size:12px;letter-spacing:.06em;}
.hbn a{display:inline-flex;align-items:center;gap:5px;color:var(--wg9);text-decoration:none;transition:color .18s;}
.hbn a:hover{color:var(--wg1);}
.hbn a::before{content:'←';}
.hbn .sep{color:var(--wg11);opacity:0.5;}

/* ── 全域容器 ──────────────────────────────────── */
.app{max-width:1600px;margin:0 auto;padding:14px 18px 60px;}

/* ── 共用 ──────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:var(--ts-sm);font-family:'Noto Sans TC',sans-serif;border-radius:var(--radius);cursor:pointer;transition:all .15s;border:1px solid var(--line);background:transparent;color:var(--wg11);line-height:1.4;}
.btn:hover{background:var(--wg1);border-color:var(--wg11);}
.btn-save{background:var(--dp);color:var(--white);border-color:var(--dp);font-weight:600;font-size:var(--ts-base);padding:9px 18px;line-height:1.4;}
.btn-save:hover{background:#174A2C;}
.btn-save:disabled{opacity:0.45;cursor:not-allowed;}
.btn-sm{padding:6px 11px;font-size:var(--ts-xs);}
.btn-png{background:var(--wg41);color:var(--white);border-color:var(--wg41);font-weight:600;font-size:var(--ts-base);padding:9px 18px;line-height:1.4;}
.btn-png:hover{background:var(--wg11);}
.btn-danger{color:var(--dn);border-color:rgba(140,31,31,0.25);}
.btn-danger:hover{background:rgba(140,31,31,0.05);border-color:var(--dn);}

.pending-bar{background:#FFF9D9;border:1px solid rgba(140,90,0,0.4);padding:9px 14px;font-size:var(--ts-sm);color:#8C5A00;display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:2px;margin-bottom:12px;}

/* 雲端同步狀態 */
.sync-state{font-size:var(--ts-xs);color:var(--wg9);display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:2px;border:1px solid var(--line);background:var(--wg1);white-space:nowrap;}
.sync-state::before{content:'●';font-size:9px;}
.sync-state.loading{color:var(--wg11);}
.sync-state.saving{color:var(--warn);}
.sync-state.saved{color:var(--dp);background:rgba(31,92,56,0.05);border-color:rgba(31,92,56,0.2);}
.sync-state.offline,.sync-state.error{color:var(--dn);background:rgba(140,31,31,0.05);border-color:rgba(140,31,31,0.25);}

/* ── 主版型左右並排 ───────────────────────────── */
.main{display:grid;grid-template-columns:minmax(0,1fr) 670px;gap:14px;align-items:start;}
@media(max-width:1100px){.main{grid-template-columns:1fr;}}

.pane{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.pane-head{padding:10px 16px;background:#F0EDE8;border-bottom:1px solid var(--line);font-size:var(--ts-sm);font-weight:600;color:var(--wg11);letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.pane-title{display:flex;align-items:center;gap:8px;}
.pane-title-text{font-size:var(--ts-base);font-weight:700;color:var(--wg41);}
.pf{width:100%;height:calc(100vh - 180px);min-height:600px;border:none;background:white;display:block;}

/* 預覽卡片動作 */
.preview-head-actions{display:flex;align-items:center;gap:14px;}

/* 資料表 toolbar，兩段 */
.dt-toolbar{padding:10px 14px;background:#F8F6F2;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}
.dt-toolbar-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.dt-toolbar select{padding:6px 10px;font-size:var(--ts-sm);border:1px solid var(--line);border-radius:1px;background:var(--white);}
.dt-toolbar .ms-arrow{padding:5px 10px;font-size:var(--ts-sm);border:1px solid var(--line);background:var(--white);cursor:pointer;border-radius:1px;color:var(--wg11);}
.dt-toolbar .ms-arrow:hover{background:var(--wg1);}
.dt-toolbar .dt-spacer{flex:1;}
.dt-toolbar label.chk{font-size:var(--ts-sm);color:var(--wg11);display:flex;align-items:center;gap:5px;cursor:pointer;}
.dt-toolbar input[type=checkbox]{width:15px;height:15px;cursor:pointer;}
.dt-aux-label{font-size:var(--ts-xs);color:var(--wg9);letter-spacing:.05em;}
.dt-aux-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:8px;}

/* 歷史表格本體 */
.htbl-wrap{max-height:calc(100vh - 240px);overflow:auto;}
.htbl{width:100%;border-collapse:collapse;font-size:var(--ts-base);}
.htbl thead th{position:sticky;top:0;background:#F0EDE8;color:var(--wg11);font-weight:600;padding:9px 8px;text-align:left;border-bottom:2px solid var(--wg11);font-size:var(--ts-sm);letter-spacing:.04em;z-index:1;}
.htbl tbody td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
.htbl tbody tr:hover{background:rgba(60,56,53,0.03);}
.htbl tbody tr.pending td{background:var(--yellow)!important;}
.htbl tbody tr.is-selected td{background:rgba(31,92,56,0.08);font-weight:500;}
.htbl tbody tr.is-selected td:first-child{box-shadow:inset 3px 0 0 var(--dp);}
.htbl input[type=number]{padding:6px 8px;font-size:var(--ts-sm);width:88px;background:var(--white);text-align:right;border:1px solid var(--line);border-radius:1px;font-family:inherit;}
.htbl input[type=number]:focus{outline:none;border-color:var(--wg11);background:#FFFEF7;}
.htbl input[type=number].is-empty{background:rgba(140,31,31,0.04);border-color:rgba(140,31,31,0.18);}
.htbl input.note-input{padding:6px 10px;font-size:var(--ts-sm);width:100%;min-width:160px;background:var(--white);text-align:left;border:1px solid var(--line);border-radius:1px;font-family:inherit;color:var(--wg41);}
.htbl input.note-input:focus{outline:none;border-color:var(--wg11);background:#FFFEF7;}
.htbl input.note-input::placeholder{color:#B5B0AB;}
.htbl input[type=checkbox]{cursor:pointer;width:18px;height:18px;}
.htbl .day-cell{cursor:pointer;user-select:none;font-weight:700;color:var(--wg41);font-size:var(--ts-base);padding:3px 0;display:inline-block;}
.htbl .day-cell:hover{color:var(--dp);}

/* Excel 匯入比對 modal */
.diff-modal{position:fixed;inset:0;background:rgba(60,56,53,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;}
.diff-box{background:var(--white);max-width:780px;width:90%;max-height:80vh;display:flex;flex-direction:column;border-radius:2px;}
.diff-head{padding:14px 18px;border-bottom:1px solid var(--line);background:#F0EDE8;display:flex;justify-content:space-between;align-items:center;}
.diff-body{flex:1;overflow:auto;padding:14px 18px;}
.diff-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#F8F6F2;}
.diff-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.diff-summary .cell{padding:10px;background:var(--wg1);border-radius:2px;text-align:center;}
.diff-summary .cell .num{font-size:24px;font-weight:700;color:var(--wg41);}
.diff-summary .cell .lbl{font-size:11px;color:var(--wg9);}
.diff-summary .cell.add .num{color:var(--dp);}
.diff-summary .cell.upd .num{color:var(--warn);}

/* ── 手機版（max-width 768px） ──────────────────── */
@media (max-width:768px){
  :root{--ts-xs:15px;--ts-sm:17px;--ts-base:19px;--ts-md:21px;}
  body{line-height:1.6;}
  /* Header 緊湊 */
  .hd{padding:14px 16px 10px;}
  .hlh{font-size:19px;}
  .hle{font-size:11px;}
  /* App padding 縮小，把更多空間讓給內容 */
  .app{padding:10px 8px 40px;}
  /* Toolbar：兩段都加大 tap 區 */
  .dt-toolbar{padding:12px;gap:10px;}
  .dt-toolbar-row{gap:8px;}
  .dt-toolbar select,.dt-toolbar .ms-arrow{padding:10px 14px;font-size:var(--ts-base);}
  .dt-toolbar label.chk{font-size:var(--ts-base);}
  .dt-toolbar input[type=checkbox]{width:20px;height:20px;}
  .btn{padding:10px 14px;font-size:var(--ts-base);}
  .btn-sm{padding:8px 12px;font-size:var(--ts-sm);}
  .btn-save,.btn-png{padding:12px 20px;font-size:var(--ts-md);}
  /* 同步指示燈 */
  .sync-state{padding:6px 10px;font-size:var(--ts-sm);}
  /* 資料表：大幅放大 */
  .htbl thead th{padding:12px 8px;font-size:var(--ts-sm);}
  .htbl tbody td{padding:11px 8px;}
  .htbl input[type=number]{width:110px;padding:10px;font-size:var(--ts-base);}
  .htbl input.note-input{padding:10px 12px;font-size:var(--ts-base);min-width:200px;}
  .htbl input[type=checkbox]{width:24px;height:24px;}
  .htbl .day-cell{font-size:var(--ts-md);padding:4px 0;}
  /* 公告預覽 iframe：手機螢幕全部高度的 75%（避免太矮看不清） */
  .pf{height:75vh;min-height:480px;}
  /* pane 標題/動作放大 */
  .pane-head{padding:12px 16px;}
  .pane-title-text{font-size:var(--ts-md);}
  /* pending bar 放大 */
  .pending-bar{padding:11px 14px;font-size:var(--ts-base);}
}
</style>
</head>
<body>

<div class="hd">
  <div class="hi">
    <div class="hbn">
      <a href="/">返回社區主頁</a>
      <span class="sep">·</span>
      <a href="/utility/">返回水電用量分析</a>
    </div>
    <div class="hle">DAILY UTILITY REPORT</div>
    <div class="hlh">閱大安・每日水電公告</div>
    <div class="hsb">CULTURAL CITY COMMUNITY · 閱大安管理委員會</div>
  </div>
</div>

<div class="app">

  <div id="pending-bar" style="display:none"></div>

  <!-- ── 主版型左右並排 ───────────────────────────── -->
  <div class="main">
    <!-- 左：資料表 -->
    <div class="pane">
      <div class="dt-toolbar">
        <div class="dt-toolbar-row">
          <button class="ms-arrow" onclick="histPrevMonth()">◀</button>
          <select id="hist-month" onchange="renderHistTable()"></select>
          <button class="ms-arrow" onclick="histNextMonth()">▶</button>
          <label class="chk"><input type="checkbox" id="hist-only-missing" onchange="renderHistTable()">只看缺資料</label>
          <span id="sync-state" class="sync-state loading">●  載入中…</span>
          <div class="dt-spacer"></div>
          <button class="btn btn-save" id="btn-commit" onclick="commitPending()" disabled>💾 儲存</button>
        </div>
        <div class="dt-aux-row">
          <span class="dt-aux-label">資料：</span>
          <button class="btn btn-sm" onclick="exportXLSX()">📥 匯出 Excel</button>
          <button class="btn btn-sm" onclick="document.getElementById('imp-xlsx').click()">📤 匯入 Excel</button>
          <input type="file" id="imp-xlsx" accept=".xlsx,.xls" style="display:none" onchange="importXLSX(event)">
          <button class="btn btn-sm" onclick="exportJSON()">JSON 匯出</button>
          <button class="btn btn-sm" onclick="document.getElementById('imp-json').click()">JSON 匯入</button>
          <input type="file" id="imp-json" accept=".json" style="display:none" onchange="importJSON(event)">
          <div class="dt-spacer"></div>
          <button class="btn btn-sm btn-danger" onclick="clearUserData()">🗑 清除自填</button>
        </div>
      </div>
      <div class="htbl-wrap" id="htbl-wrap"></div>
    </div>

    <!-- 右：公告預覽 -->
    <div class="pane">
      <div class="pane-head">
        <div class="pane-title">
          <span class="pane-title-text">📱 公告預覽</span>
        </div>
        <button class="btn btn-png" onclick="dlPNG()" id="btn-png">📥 下載</button>
      </div>
      <iframe id="pf-card" class="pf"></iframe>
    </div>
  </div>

</div>

<div id="diff-modal" style="display:none"></div>

var WD=['日','一','二','三','四','五','六'];
var histMonthYM=null;

function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isoMinus(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()-n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseISO(s){var p=s.split('-');return {y:+p[0],m:+p[1],d:+p[2]};}
function isoToDate(s){var o=parseISO(s);return new Date(o.y,o.m-1,o.d);}
function dateToISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtDate(s){if(!s)return'';var o=parseISO(s);return o.y+'年'+o.m+'月'+o.d+'日（星期'+WD[new Date(o.y,o.m-1,o.d).getDay()]+'）';}
function fmtDateShort(s){if(!s)return'';var o=parseISO(s);return o.y+'年'+o.m+'月'+o.d+'日';}
function fmtYM(yr,mo){return yr+'年'+mo+'月';}
function daysInMonth(yr,mo){return new Date(yr,mo,0).getDate();}
function monthYM(yr,mo){return yr+'-'+String(mo).padStart(2,'0');}

function dayProgressOfReport(repISO){
  var o=parseISO(repISO);
  var dim=daysInMonth(o.y,o.m);
  var pct=o.d/dim*100;
  return {refYr:o.y,refMo:o.m,refDay:o.d,daysInMonth:dim,pct:pct};
}

// ────────────────────────────────────────────────────────────────────
// 資料層：雲端 Cloudflare KV（透過既有 Worker），localStorage 做離線備份
// ────────────────────────────────────────────────────────────────────
var STORE_KEY='yda_utility_v3';
var API_URL='/admin/utility/api/data';
var _cache=null;            // in-memory cache，所有 getStore/setStore 經此處
var _lastSyncedAt=null;     // 最後一次成功同步的時間戳

function emptyStore(){return {water:{},electric:{},temperature:{},cleanDay:{},note:{}};}

function normalizeStore(s){
  s=s||{};
  ['water','electric','temperature','cleanDay','note'].forEach(function(k){s[k]=s[k]||{};});
  return s;
}

function loadLocalCache(){
  try{var raw=localStorage.getItem(STORE_KEY);return raw?normalizeStore(JSON.parse(raw)):emptyStore();}
  catch(e){return emptyStore();}
}
function writeLocalCache(s){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}
}

// 來自 /utility/data/daily-temp.json 的最新氣溫（每日由 GitHub Actions 自動更新）
var _dailyTempMap=null;  // {'YYYY-MM-DD': tmax}
async function loadDailyTempJson(){
  try{
    var res=await fetch('/utility/data/daily-temp.json',{cache:'no-store'});
    if(!res.ok)return;
    var arr=await res.json();
    var m={};
    arr.forEach(function(r){if(r&&r.d&&Number.isFinite(r.tmax))m[r.d]=r.tmax;});
    _dailyTempMap=m;
  }catch(e){console.warn('daily-temp.json 載入失敗：',e.message);}
}

// 從雲端 KV 載入；失敗則 fallback 到本機 localStorage
async function loadFromServer(){
  setSyncState('loading','從雲端載入中…');
  try{
    var res=await fetch(API_URL,{credentials:'same-origin',cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    var data=await res.json();
    _cache=normalizeStore(data);
    writeLocalCache(_cache);
    _lastSyncedAt=new Date();
    setSyncState('saved','已同步 · '+fmtTime(_lastSyncedAt));
    return _cache;
  }catch(e){
    console.warn('雲端載入失敗，使用本機備份：',e.message);
    _cache=loadLocalCache();
    setSyncState('offline','離線模式 · 雲端讀取失敗');
    return _cache;
  }
}

async function saveToServer(){
  if(!_cache)return false;
  setSyncState('saving','儲存到雲端中…');
  try{
    var res=await fetch(API_URL,{
      method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(_cache)
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    _lastSyncedAt=new Date();
    setSyncState('saved','已同步 · '+fmtTime(_lastSyncedAt));
    return true;
  }catch(e){
    console.warn('雲端儲存失敗：',e.message);
    setSyncState('error','雲端同步失敗 · 本機已存');
    return false;
  }
}

async function deleteOnServer(){
  setSyncState('saving','清除雲端資料…');
  try{
    var res=await fetch(API_URL,{method:'DELETE',credentials:'same-origin'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    _lastSyncedAt=new Date();
    setSyncState('saved','已同步 · '+fmtTime(_lastSyncedAt));
    return true;
  }catch(e){
    setSyncState('error','雲端清除失敗 · 本機已清');
    return false;
  }
}

// 同步讀寫（呼叫者後續若需要同步雲端，要自己 await saveToServer()）
function getStore(){if(!_cache)_cache=loadLocalCache();return _cache;}
function setStore(s){_cache=normalizeStore(s);writeLocalCache(_cache);}

// 顯示同步狀態
function setSyncState(state,text){
  var el=document.getElementById('sync-state');
  if(!el)return;
  el.className='sync-state '+state;
  el.textContent=text;
}
function fmtTime(d){return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

var pending=emptyStore();
function hasPending(){return ['water','electric','temperature','cleanDay','note'].some(function(k){return Object.keys(pending[k]).length>0;});}
function pendingCount(){return ['water','electric','temperature','cleanDay','note'].reduce(function(a,k){return a+Object.keys(pending[k]).length;},0);}

function getSeedValue(seed,dateISO){
  var startD=isoToDate(seed.start);var endD=isoToDate(seed.end);var targetD=isoToDate(dateISO);
  if(targetD<startD||targetD>endD)return null;
  var offset=Math.round((targetD-startD)/86400000);
  var v=seed.values[offset];return v===undefined?null:v;
}

function getValue(type,dateISO){
  if(pending[type]&&pending[type][dateISO]!==undefined)return pending[type][dateISO];
  var s=getStore();
  if(s[type]&&s[type][dateISO]!==undefined)return s[type][dateISO];
  if(type==='water')return getSeedValue(SEED_W,dateISO);
  if(type==='electric')return getSeedValue(SEED_E,dateISO);
  if(type==='temperature'){
    // 優先讀 runtime fetch 的 daily-temp.json（含最新天）；fallback 到內嵌 SEED_T 快照
    if(_dailyTempMap&&_dailyTempMap[dateISO]!==undefined)return _dailyTempMap[dateISO];
    return getSeedValue(SEED_T,dateISO);
  }
  return null;
}

function getSource(type,dateISO){
  if(pending[type]&&pending[type][dateISO]!==undefined)return 'pending';
  var s=getStore();
  if(s[type]&&s[type][dateISO]!==undefined)return 'user';
  if(type==='water'&&getSeedValue(SEED_W,dateISO)!==null)return 'seed';
  if(type==='electric'&&getSeedValue(SEED_E,dateISO)!==null)return 'seed';
  if(type==='temperature'){
    if(_dailyTempMap&&_dailyTempMap[dateISO]!==undefined)return 'live';
    if(getSeedValue(SEED_T,dateISO)!==null)return 'seed';
  }
  return 'empty';
}

function stageChange(type,dateISO,val){
  if(val===null||val===undefined||val===''){delete pending[type][dateISO];}
  else if(type==='note'){pending[type][dateISO]=String(val);}
  else{pending[type][dateISO]=typeof val==='boolean'?val:Number(val);}
  if(pending[type][dateISO]!==undefined){
    var s=getStore();
    var committed=s[type]&&s[type][dateISO]!==undefined?s[type][dateISO]:null;
    var seed=type==='water'?getSeedValue(SEED_W,dateISO)
            :type==='electric'?getSeedValue(SEED_E,dateISO)
            :type==='temperature'?getSeedValue(SEED_T,dateISO):null;
    var ref=committed!==null?committed:seed;
    if(ref!==null&&ref===pending[type][dateISO])delete pending[type][dateISO];
  }
  updatePendingBar();
}

async function commitPending(){
  if(!hasPending())return;
  var n=pendingCount();
  if(!confirm('確定要儲存 '+n+' 筆變更到雲端嗎？\n（會立即同步到所有人共用的儲存空間）'))return;
  var s=getStore();
  ['water','electric','temperature','cleanDay','note'].forEach(function(k){
    s[k]=s[k]||{};Object.keys(pending[k]).forEach(function(d){s[k][d]=pending[k][d];});
  });
  setStore(s);pending=emptyStore();updatePendingBar();render();renderHistTable();
  await saveToServer();
}

function discardPending(){
  if(!hasPending())return;
  if(!confirm('確定要放棄 '+pendingCount()+' 筆未儲存的變更嗎？'))return;
  pending=emptyStore();updatePendingBar();render();renderHistTable();
}

function updatePendingBar(){
  var bar=document.getElementById('pending-bar');
  var btnSave=document.getElementById('btn-commit');
  if(hasPending()){
    bar.style.display='';
    bar.className='pending-bar';
    bar.innerHTML='<div>📝 有 <strong>'+pendingCount()+'</strong> 筆未儲存的變更</div>'
      +'<div style="display:flex;gap:6px"><button class="btn btn-sm btn-save" onclick="commitPending()">💾 儲存</button>'
      +'<button class="btn btn-sm" onclick="discardPending()">✕ 放棄</button></div>';
    btnSave.disabled=false;
    btnSave.textContent='💾 儲存 ('+pendingCount()+')';
  }else{
    bar.style.display='none';
    btnSave.disabled=true;
    btnSave.textContent='💾 儲存';
  }
}

// ────────────────────────────────────────────────────────────────────
// 月份範圍計算
// ────────────────────────────────────────────────────────────────────
function sumRange(type,startISO,endISO){
  var sd=isoToDate(startISO),ed=isoToDate(endISO);
  var sum=0,count=0,missing=0;
  for(var d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){
    var iso=dateToISO(d);var v=getValue(type,iso);
    if(v===null||v===undefined)missing++;else{sum+=v;count++;}
  }
  return {sum:sum,count:count,missing:missing};
}
function getMonthlyTotal(type,yr,mo){
  var startISO=monthYM(yr,mo)+'-01';
  var endISO=monthYM(yr,mo)+'-'+String(daysInMonth(yr,mo)).padStart(2,'0');
  return sumRange(type,startISO,endISO);
}
function getCumulativeTo(type,yr,mo,day){
  var startISO=monthYM(yr,mo)+'-01';
  var endISO=monthYM(yr,mo)+'-'+String(day).padStart(2,'0');
  return sumRange(type,startISO,endISO);
}
function earliestDataDay(type,yr,mo){
  var seed=type==='water'?SEED_W:type==='electric'?SEED_E:type==='temperature'?SEED_T:null;
  if(!seed)return 0;
  var seedStart=isoToDate(seed.start);
  var monthStart=new Date(yr,mo-1,1);
  if(seedStart<=monthStart)return 1;
  if(seedStart.getFullYear()===yr&&seedStart.getMonth()+1===mo)return seedStart.getDate();
  return 0;
}

function calcMetrics(type,repISO){
  var dp=dayProgressOfReport(repISO);
  var refYr=dp.refYr,refMo=dp.refMo,refDay=dp.refDay,dim=dp.daysInMonth;
  // 本月實際累計（給「本月累計」大數字顯示用，以 refDay 為準）
  var cumActualR=getCumulativeTo(type,refYr,refMo,refDay);
  var cum=cumActualR.sum;
  var projected=refDay>0?cum/refDay*dim:null;

  // 上月
  var lastYr=refMo===1?refYr-1:refYr, lastMo=refMo===1?12:refMo-1;
  var lastDim=daysInMonth(lastYr,lastMo);
  // 去年同月
  var yoyYr=refYr-1, yoyMo=refMo;
  var yoyDim=daysInMonth(yoyYr,yoyMo);

  var lastEarliest=earliestDataDay(type,lastYr,lastMo);
  var yoyEarliest=earliestDataDay(type,yoyYr,yoyMo);

  // 嘗試算 yoy 是否完整
  var yoyHasData=yoyEarliest===1;
  // 三方共同天數：如果 yoy 有資料，三邊取最小；否則只看本月跟上月
  var commonDays=yoyHasData?Math.min(refDay,lastDim,yoyDim):Math.min(refDay,lastDim);
  var trimDays=refDay-commonDays;

  // 本月、上月、去年同月，都用 commonDays 對齊
  var curR=getCumulativeTo(type,refYr,refMo,commonDays);
  var lastR=getCumulativeTo(type,lastYr,lastMo,commonDays);
  var yoyR=getCumulativeTo(type,yoyYr,yoyMo,commonDays);

  var lastFull=getMonthlyTotal(type,lastYr,lastMo);
  var yoyFull=getMonthlyTotal(type,yoyYr,yoyMo);

  var momReady=lastEarliest===1&&lastR.missing===0&&lastR.count===commonDays
    &&curR.missing===0&&curR.count===commonDays;
  var yoyReady=yoyEarliest===1&&yoyR.missing===0&&yoyR.count===commonDays
    &&curR.missing===0&&curR.count===commonDays;

  return {
    cum:cum,refDay:refDay,dim:dim,projected:projected,refYr:refYr,refMo:refMo,
    // 對齊期間
    commonDays:commonDays,
    trimmed:trimDays>0,
    trimDays:trimDays,
    // 本月、上月、去年同月（commonDays 內的累計）
    curForCompare:curR.sum,
    lastMonthSamePeriod:lastR.sum,lastMonthFull:lastFull.sum,
    lastMonthMeta:{yr:lastYr,mo:lastMo,sameDay:commonDays,dim:lastDim,earliest:lastEarliest},
    momReady:momReady,
    momPct:momReady&&lastR.sum>0?(curR.sum-lastR.sum)/lastR.sum*100:null,
    yoyMonthSamePeriod:yoyR.sum,yoyMonthFull:yoyFull.sum,
    yoyMeta:{yr:yoyYr,mo:yoyMo,sameDay:commonDays,dim:yoyDim,earliest:yoyEarliest},
    yoyReady:yoyReady,
    yoyPct:yoyReady&&yoyR.sum>0?(curR.sum-yoyR.sum)/yoyR.sum*100:null
  };
}

function fmtNum(n,decimals){
  if(n===null||n===undefined||isNaN(n))return '—';
  decimals=decimals===undefined?(n>=100?0:n>=10?1:2):decimals;
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function pctArrow(p){if(p===null||p===undefined)return '→';if(p>3)return '↑';if(p<-3)return '↓';return '→';}
function pctColor(p){if(p===null)return '#696460';if(p>3)return '#8C1F1F';if(p<-3)return '#1F5C38';return '#696460';}

// ────────────────────────────────────────────────────────────────────
// 用電目標迴歸（單一全段模型，凍結於 2025-04-20 ~ 2026-04-19 共 365 天）
//   目標 = max( A + B × tmax, FLOOR )
//   交叉點約 16.6°C；警戒 = 目標 × 1.1
// ────────────────────────────────────────────────────────────────────
var AC_A=72.99, AC_B=7.07, AC_FLOOR=190;
function calcETarget(tmax){if(tmax===null||tmax===undefined)return null;return Math.max(AC_A+AC_B*tmax, AC_FLOOR);}
function calcEWarn(tmax){var t=calcETarget(tmax);return t===null?null:t*1.1;}
function calcEStatus(eYd,tmax){
  if(eYd===null||tmax===null)return null;
  var target=calcETarget(tmax),warn=calcEWarn(tmax);
  if(eYd<=target)return{s:'good',label:'低於預期',detail:'預期 '+target.toFixed(0)+' 度，警戒 '+warn.toFixed(0)+' 度'};
  if(eYd<=warn)return{s:'warn',label:'接近警戒',detail:'預期 '+target.toFixed(0)+' 度，警戒 '+warn.toFixed(0)+' 度'};
  return{s:'over',label:'超出警戒',detail:'目標 '+target.toFixed(0)+' 度，警戒 '+warn.toFixed(0)+' 度，實際 '+eYd+' 度'};
}
function calcWStatus(wYd,isClean){
  if(wYd===null)return null;
  var max=isClean?0.5:0.2;
  if(wYd<=max)return{s:'good',label:'用水正常',detail:(isClean?'清潔日':'非清潔日')+' ≤'+max+' 度'};
  return{s:'over',label:'用水偏高',detail:(isClean?'清潔日':'非清潔日')+' >'+max+' 度，請確認原因'};
}

var currentReportDate = isoMinus(todayISO(),1); // 預設昨天

function setReportTo(iso){
  if(currentReportDate===iso)return;
  currentReportDate=iso;
  // 同步該日期所在月份
  var ym=iso.slice(0,7);
  if(histMonthYM!==ym){
    histMonthYM=ym;
    var sel=document.getElementById('hist-month');
    if(sel)sel.value=ym;
    renderHistTable();
  }else{
    updateRowHighlight();
  }
  render();
}

function updateRowHighlight(){
  document.querySelectorAll('.htbl tbody tr').forEach(function(tr){
    tr.classList.toggle('is-selected', tr.getAttribute('data-date')===currentReportDate);
  });
}

function sc(s){return {good:'#1F5C38',warn:'#8C5A00',over:'#8C1F1F',ok:'#696460'}[s]||'#696460';}
function sb(s){return {good:'rgba(31,92,56,0.09)',warn:'rgba(140,90,0,0.09)',over:'rgba(140,31,31,0.09)',ok:'rgba(60,56,53,0.05)'}[s]||'rgba(60,56,53,0.05)';}
function si(s){return {good:'✓',warn:'⚠',over:'✗',ok:'·'}[s]||'';}

function getDailyForCard(){
  var rep=currentReportDate;
  return {
    rep:rep,
    eYd:getValue('electric',rep),
    wYd:getValue('water',rep),
    tmax:getValue('temperature',rep),
    isClean:!!(pending.cleanDay[rep]!==undefined?pending.cleanDay[rep]:(getStore().cleanDay||{})[rep])
  };
}

// 三條對比 bar 一組：本月、上月、去年同月
function comparisonGroup3(curVal,lastVal,yoyVal,curLabel,lastLabel,yoyLabel,unit,
                          momPct,yoyPct,momReady,yoyReady,momNa,yoyNa){
  var values=[curVal];
  if(momReady)values.push(lastVal);
  if(yoyReady)values.push(yoyVal);
  var max=values.length>0?Math.max.apply(null,values):1;
  if(max<=0)max=1;

  function bar(label,val,ready,naReason,pct,pctTitle){
    if(!ready||val===null||val===undefined){
      return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
        +'<div style="font-size:19px;color:#898480;width:168px;flex-shrink:0">'+label+'</div>'
        +'<div style="flex:1;position:relative;height:14px;background:rgba(60,56,53,0.05);border-radius:2px"></div>'
        +'<div style="font-size:18px;color:#898480;min-width:200px">資料不足'+(naReason?'（'+naReason+'）':'')+'</div>'
        +'</div>';
    }
    var w=val/max*100;
    var isCur=pct===null;
    var color=isCur?'#3C3835':pctColor(pct);
    var opacity=isCur?'1':'0.85';
    var bg=isCur?'#3C3835':color;
    return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">'
      +'<div style="font-size:19px;color:#898480;width:168px;flex-shrink:0">'+label+'</div>'
      +'<div style="flex:1;position:relative;height:14px;background:rgba(60,56,53,0.07);border-radius:2px">'
      +'<div style="position:absolute;left:0;top:0;height:100%;width:'+w+'%;background:'+bg+';border-radius:2px;opacity:'+opacity+'"></div>'
      +'</div>'
      +'<div style="font-size:19px;color:'+(isCur?'#3C3835':'#696460')+';min-width:200px;font-weight:'+(isCur?'600':'500')+'">'
      +fmtNum(val)+' '+unit
      +(pct!==null?' <span style="color:'+color+';font-weight:600;margin-left:4px">'+pctArrow(pct)+' '+(pct>0?'+':'')+pct.toFixed(1)+'%</span>':'')
      +'</div>'
      +'</div>';
  }

  return ''
    +bar(curLabel,curVal,true,null,null,null)
    +bar(lastLabel,lastVal,momReady,momNa,momPct,'環比')
    +bar(yoyLabel,yoyVal,yoyReady,yoyNa,yoyPct,'同比');
}

// ── Line 卡片 ──
function genCard(){
  var d=getDailyForCard();
  var rep=d.rep, eYd=d.eYd, wYd=d.wYd, tmax=d.tmax, isClean=d.isClean;
  var dp=dayProgressOfReport(rep);
  var noteRaw=getValue('note',rep);var note=noteRaw?String(noteRaw).trim():'';
  var eM=calcMetrics('electric',rep);
  var wM=calcMetrics('water',rep);
  var eACSt=calcEStatus(eYd,tmax);
  var eTarget=calcETarget(tmax),eWarn=calcEWarn(tmax);
  var wFixSt=calcWStatus(wYd,isClean);
  var stoneTex="repeating-linear-gradient(92deg,transparent,transparent 120px,rgba(60,56,53,0.03) 120px,rgba(60,56,53,0.03) 121px)";

  // 共用：本月/上月/去年三條 bar
  function makeBars(type,yd,m,unit){
    var curLabel='本月 1—'+m.commonDays+'天';
    var lastLabel='上月 1—'+m.commonDays+'天';
    var yoyLabel='去年同月 1—'+m.commonDays+'天';
    var yoyNa=m.yoyMeta.earliest===0?'無內建資料':(m.yoyReady?null:'同期資料未完整');
    var trimNote=m.trimmed?'本月 '+m.refDay+' 號超出對比月份天數，比較裁切到 '+m.commonDays+' 號':null;
    return {
      bars: comparisonGroup3(m.curForCompare,m.lastMonthSamePeriod,m.yoyMonthSamePeriod,
        curLabel,lastLabel,yoyLabel,unit,
        m.momPct,m.yoyPct,m.momReady,m.yoyReady,null,yoyNa),
      trimNote: trimNote
    };
  }

  // 大公電區塊（含 Option B 目標 chip）
  function elecBlock(){
    if(eYd===null||eYd===undefined)return '';
    var stColor=eACSt?sc(eACSt.s):'#696460';

          +'<div style="font-size:75px;font-weight:700;color:'+actualColor+';letter-spacing:-.02em;line-height:1">'+eYd+'</div>'

  }

  // 公水區塊（與電力同款 chip mini-table）
  function waterBlock(){
    if(wYd===null||wYd===undefined)return '';
    var stColor=wFixSt?sc(wFixSt.s):'#696460';

    var actualColor=wFixSt&&wFixSt.s==='over'?'#8C1F1F':'#3C3835';

    else if(wFixSt&&wFixSt.s==='good'){wChipFg='#1F5C38';}

    // 今日類型對應的正常上限（單一門檻）
    var normalMax=isClean?0.5:0.2;

    // 用水上限 chip mini-table（類型 / 正常上限）
    var wChipHtml='';
    if(wFixSt){
      var rs='display:flex;align-items:baseline;justify-content:space-between;gap:14px;line-height:1.5;';

function listAvailableMonths(){
  var months={};
  var today=todayISO();
  var start=isoToDate(SEED_W.start);
  var end=isoToDate(today);
  for(var d=new Date(start);d<=end;){
    months[monthYM(d.getFullYear(),d.getMonth()+1)]=true;
    d.setMonth(d.getMonth()+1);
  }
  return Object.keys(months).sort().reverse();
}

}

function renderHistTable(){
  var sel=document.getElementById('hist-month');

  var p=histMonthYM.split('-');
  var yr=+p[0], mo=+p[1];
  var dim=daysInMonth(yr,mo);
  var onlyMissing=document.getElementById('hist-only-missing').checked;
  var selectedRep=currentReportDate;
  var today=todayISO();

  var rows='<table class="htbl"><thead><tr>'
    +'<th style="width:48px">日</th><th style="width:34px">週</th>'
    +'<th style="width:112px">⚡ 電 (度)</th><th style="width:112px">💧 水 (度)</th><th style="width:124px">🌡 高溫 (°C)</th>'
    +'<th style="width:56px">清潔</th>'
    +'<th>📝 備註</th>'
    +'</tr></thead><tbody>';

  for(var day=1;day<=dim;day++){
    var iso=monthYM(yr,mo)+'-'+String(day).padStart(2,'0');
    var eVal=getValue('electric',iso);
    var wVal=getValue('water',iso);
    var tVal=getValue('temperature',iso);
    var noteVal=getValue('note',iso)||'';
    var sE=getSource('electric',iso), sW=getSource('water',iso), sT=getSource('temperature',iso);
    var clean=!!(pending.cleanDay[iso]!==undefined?pending.cleanDay[iso]:(getStore().cleanDay||{})[iso]);
    var noteIsPending=pending.note&&pending.note[iso]!==undefined;
    var hasMissing=(eVal===null||eVal===undefined)||(wVal===null||wVal===undefined);
    var hasPendingFlag=(sE==='pending'||sW==='pending'||sT==='pending'||noteIsPending);
    if(onlyMissing&&!hasMissing)continue;

    var rowClass='';
    if(hasPendingFlag)rowClass+=' pending';
    if(iso===selectedRep)rowClass+=' is-selected';
    var weekday=WD[isoToDate(iso).getDay()];
    var dayCellClass='day-cell'+(iso===today?' is-today':'');

    var eEmpty=(eVal===null||eVal===undefined);
    var wEmpty=(wVal===null||wVal===undefined);
    var tEmpty=(tVal===null||tVal===undefined);
    var noteEsc=String(noteVal).replace(/"/g,'&quot;').replace(/'/g,"&#39;");

    rows+='<tr class="'+rowClass+'" data-date="'+iso+'">'
      +'<td><span class="'+dayCellClass+'" onclick="setReportTo(\''+iso+'\')" title="設為報告日">'+iso.slice(8)+'</span></td>'
      +'<td style="color:var(--wg9);font-size:12px">'+weekday+'</td>'
      +'<td><input type="number" step="0.01" '+(eEmpty?'class="is-empty"':'')+' value="'+(eEmpty?'':eVal)+'" oninput="histCellChange(\''+iso+'\',\'electric\',this.value)" onfocus="setReportTo(\''+iso+'\')"></td>'
      +'<td><input type="number" step="0.01" '+(wEmpty?'class="is-empty"':'')+' value="'+(wEmpty?'':wVal)+'" oninput="histCellChange(\''+iso+'\',\'water\',this.value)" onfocus="setReportTo(\''+iso+'\')"></td>'
      +'<td><input type="number" step="0.1" '+(tEmpty?'class="is-empty"':'')+' value="'+(tEmpty?'':tVal)+'" oninput="histCellChange(\''+iso+'\',\'temperature\',this.value)" onfocus="setReportTo(\''+iso+'\')"></td>'
      +'<td style="text-align:center"><input type="checkbox" '+(clean?'checked':'')+' onchange="histCellChange(\''+iso+'\',\'cleanDay\',this.checked)"></td>'
      +'<td><input type="text" class="note-input" value="'+noteEsc+'" oninput="histCellChange(\''+iso+'\',\'note\',this.value)" onfocus="setReportTo(\''+iso+'\')"></td>'
      +'</tr>';
  }
  rows+='</tbody></table>';
  document.getElementById('htbl-wrap').innerHTML=rows;
}

function histCellChange(iso,type,val){
  if(type==='cleanDay'){
    pending.cleanDay[iso]=!!val;
    var s=getStore();
    var existing=s.cleanDay&&s.cleanDay[iso];
    if(!!val===!!existing)delete pending.cleanDay[iso];
  }else if(type==='note'){
    var s2=getStore();
    var existingNote=(s2.note||{})[iso]||'';
    if(val===existingNote){
      delete pending.note[iso];
    }else{
      pending.note[iso]=String(val);
    }
  }else{
    var v=val===''?null:parseFloat(val);
    if(val!==''&&isNaN(v))return;
    stageChange(type,iso,v);
  }
  updatePendingBar();
  if(iso===currentReportDate)render();
}

function normalizeExcelDate(v){
  if(v==null)return null;
  if(typeof v==='string'){var m=v.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);if(m)return m[1]+'-'+String(+m[2]).padStart(2,'0')+'-'+String(+m[3]).padStart(2,'0');}
  if(typeof v==='number'){var d=new Date(Date.UTC(1899,11,30)+v*86400000);return d.toISOString().slice(0,10);}
  if(v instanceof Date){return dateToISO(v);}
  return null;
}

function analyzeXLSXImport(rows){
  var fields=[
    {key:'electric',aliases:['用電度數(度)','用電度數','電','大公電','電度','用電']},
    {key:'water',aliases:['用水度數(度)','用水度數','水','公水','水度','用水']},
    {key:'temperature',aliases:['最高氣溫(°C)','最高氣溫','氣溫','tmax','溫度']},
    {key:'cleanDay',aliases:['清潔日','清潔','打掃']},
    {key:'note',aliases:['備註','註記','memo','note']}
  ];
  if(!rows.length){alert('Excel 沒有資料列');return;}
  var keys=Object.keys(rows[0]);
  function findKey(aliases){for(var i=0;i<keys.length;i++){var k=keys[i].trim();for(var j=0;j<aliases.length;j++){if(k===aliases[j]||k.indexOf(aliases[j])>=0)return keys[i];}}return null;}
  var dateKey=null;
  for(var i=0;i<keys.length;i++){var k=keys[i].trim();if(k==='日期'||k.toLowerCase()==='date'){dateKey=keys[i];break;}}
  if(!dateKey){alert('找不到「日期」欄');return;}
  var fieldKeys={};fields.forEach(function(f){fieldKeys[f.key]=findKey(f.aliases);});

  var diff={add:[],upd:[],same:[],invalid:[]};
  rows.forEach(function(row){
    var rawDate=row[dateKey];
    var iso=normalizeExcelDate(rawDate);
    if(!iso){diff.invalid.push({raw:rawDate});return;}
    var rec={date:iso,changes:[]};
    fields.forEach(function(f){
      var k=fieldKeys[f.key];if(!k)return;
      var raw=row[k];var newVal;
      if(f.key==='cleanDay'){
        if(raw===null||raw===''||raw===undefined)newVal=null;
        else if(typeof raw==='boolean')newVal=raw;
        else newVal=(/^(是|y|yes|1|true|✓)$/i.test(String(raw).trim()));
      }else if(f.key==='note'){
        if(raw===null||raw===undefined)newVal=null;
        else{var ss=String(raw).trim();newVal=ss===''?null:ss;}
      }else{
        if(raw===null||raw===''||raw===undefined)newVal=null;
        else{var n=parseFloat(raw);newVal=isNaN(n)?null:n;}
      }
      if(newVal===null)return;
      var existing=getValue(f.key,iso);
      if(f.key==='cleanDay'){var sa=getStore();existing=(sa.cleanDay||{})[iso];if(!!newVal!==!!existing){rec.changes.push({type:f.key,old:!!existing,new:newVal});}}
      else if(f.key==='note'){var sb=getStore();existing=(sb.note||{})[iso]||'';if(String(newVal)!==String(existing)){rec.changes.push({type:f.key,old:existing||null,new:newVal});}}
      else{
        if(existing===null||existing===undefined){rec.changes.push({type:f.key,old:null,new:newVal});}
        else if(Math.abs(existing-newVal)>0.001){rec.changes.push({type:f.key,old:existing,new:newVal});}
      }
    });
    if(!rec.changes.length){diff.same.push(rec);return;}
    var hasNew=rec.changes.some(function(c){return c.old===null||c.old===undefined;});
    var hasUpd=rec.changes.some(function(c){return c.old!==null&&c.old!==undefined;});
    if(hasNew&&!hasUpd)diff.add.push(rec);
    else diff.upd.push(rec);
  });
  showImportDiff(diff);
}

function showImportDiff(diff){
  var typeLabel={electric:'電',water:'水',temperature:'氣溫',cleanDay:'清潔',note:'備註'};
  function fmtVal(t,v){if(v===null)return '—';if(t==='cleanDay')return v?'是':'否';if(t==='note')return '"'+v+'"';return v;}
  var rowsHTML='';
  function block(title,arr,color){
    if(!arr.length)return '';
    var inner=arr.slice(0,50).map(function(r){
      var ch=r.changes.map(function(c){return typeLabel[c.type]+': '+fmtVal(c.type,c.old)+' → <strong>'+fmtVal(c.type,c.new)+'</strong>';}).join('；');
      return '<tr><td style="padding:5px 10px">'+r.date+'</td><td style="padding:5px 10px">'+ch+'</td></tr>';
    }).join('');
    return '<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:'+color+';margin-bottom:5px">'+title+'（共 '+arr.length+' 筆，僅顯示前 50）</div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--line)"><tbody>'+inner+'</tbody></table></div>';
  }
  rowsHTML+=block('🆕 新增',diff.add,'var(--dp)');
  rowsHTML+=block('✏️ 修改',diff.upd,'var(--warn)');
  if(diff.invalid.length){rowsHTML+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:var(--dn);margin-bottom:5px">⚠ 無法解析的列（共 '+diff.invalid.length+'）</div></div>';}

  var html='<div class="diff-modal" onclick="if(event.target===this)closeDiffModal()">'
    +'<div class="diff-box">'
    +'<div class="diff-head"><div style="font-size:14px;font-weight:600">Excel 匯入 — 變更比對</div><button class="btn-sm btn" onclick="closeDiffModal()">關閉</button></div>'
    +'<div class="diff-body">'
    +'<div class="diff-summary">'
    +'<div class="cell add"><div class="num">'+diff.add.length+'</div><div class="lbl">將新增（日期數）</div></div>'
    +'<div class="cell upd"><div class="num">'+diff.upd.length+'</div><div class="lbl">將修改（日期數）</div></div>'
    +'<div class="cell"><div class="num">'+diff.same.length+'</div><div class="lbl">無變動（將忽略）</div></div>'
    +'</div>'+rowsHTML+'</div>'
    +'<div class="diff-foot"><button class="btn" onclick="closeDiffModal()">取消</button>'
    +'<button class="btn btn-save" onclick="applyImport()">確認匯入 '+(diff.add.length+diff.upd.length)+' 筆</button>'
    +'</div></div></div>';
  document.getElementById('diff-modal').style.display='';
  document.getElementById('diff-modal').innerHTML=html;
  window._pendingDiff=diff;
}

function closeDiffModal(){document.getElementById('diff-modal').style.display='none';document.getElementById('diff-modal').innerHTML='';window._pendingDiff=null;}

async function applyImport(){
  var diff=window._pendingDiff;if(!diff)return;
  var s=getStore();
  diff.add.concat(diff.upd).forEach(function(r){
    r.changes.forEach(function(c){
      s[c.type]=s[c.type]||{};s[c.type][r.date]=c.new;
    });
  });
  setStore(s);closeDiffModal();
  render();renderHistTable();
  var ok=await saveToServer();
  alert(ok?'已匯入並同步到雲端 '+(diff.add.length+diff.upd.length)+' 筆':'已匯入 '+(diff.add.length+diff.upd.length)+' 筆，但雲端同步失敗（本機已存）');
}

async function clearUserData(){
  if(!confirm('確定要清除所有自填的水電/氣溫資料嗎？\n（內建 4 年歷史不會被清除；雲端共用資料也會清除——所有人都會看不到）'))return;
  localStorage.removeItem(STORE_KEY);
  _cache=emptyStore();
  pending=emptyStore();
  updatePendingBar();render();renderHistTable();
  var ok=await deleteOnServer();
  alert(ok?'已清除（雲端與本機都清乾淨）':'本機已清除，但雲端清除失敗，請稍後再試');
}

// ────────────────────────────────────────────────────────────────────
// 初始化：先從雲端載入共用資料，再 render
// ────────────────────────────────────────────────────────────────────
(async function(){
  populateMonthSelect();
  histMonthYM=currentReportDate.slice(0,7);
  document.getElementById('hist-month').value=histMonthYM;
  // 先以本機快取 render（快），同時去雲端 + daily-temp.json 拉最新資料
  renderHistTable();
  render();
  await Promise.all([loadFromServer(),loadDailyTempJson()]);
  // 載入回來後再 render 一次（雲端比本機新或 JSON 有新天時，畫面會更新）
  renderHistTable();
  render();
})();
</script>
