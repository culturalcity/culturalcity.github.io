<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" font-family="'Noto Sans TC', 'Noto Sans CJK TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">
<title>雨水流出抑制設施剖面示意圖</title>
<desc>建築物雨水從屋頂經雨水管收集至地下雨水池，雨水池內由浮球感測水位、控制沈水馬達抽水，並經止水閥排放至公共雨水下水道。</desc>

