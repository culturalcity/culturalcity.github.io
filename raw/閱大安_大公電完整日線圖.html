  id: 'summer',
  beforeDraw(chart) {
    const {ctx, chartArea: ca, scales: sc} = chart;
    if (!ca) return;
    // 夏季背景 6–9月
    RAW.forEach((r, i) => {
      const m = parseInt(r[0].slice(5,7));
      if (m >= 6 && m <= 9) {
        const x = sc.x.getPixelForValue(i);
        const next = i < RAW.length-1 ? sc.x.getPixelForValue(i+1) : x+1;
        ctx.fillStyle = 'rgba(250,236,231,0.6)';
        ctx.fillRect(x, ca.top, next-x, ca.height);
      }
    });
    // 月份分隔虛線

      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(x, ca.top); ctx.lineTo(x, ca.bottom); ctx.stroke();

    });
