<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;

  color: #1a1a1a;

#app { max-width: 900px; margin: 0 auto; padding: 32px 24px 48px; }
.header { margin-bottom: 20px; }

.picker-row {
  display: flex; align-items: center; gap: 10px;

}
.picker-row label { font-size: 15px; color: #5F5E5A; white-space: nowrap; }
.sel-group { display: flex; gap: 6px; }
.sel-group select {
  font-family: inherit; font-size: 15px; color: #1a1a1a;

  border-radius: 6px; padding: 7px 28px 7px 10px; cursor: pointer;

}
.sel-group select:focus { outline: none; border-color: #185FA5; }
.nav-box {
  display: flex; align-items: center; gap: 4px;
  background: #fff; border: 0.5px solid #d3d1c7;
  border-radius: 8px; padding: 5px 8px;
}
.nav-box button {
  background: none; border: none; cursor: pointer;
  color: #5F5E5A; font-size: 18px; padding: 2px 6px;
  border-radius: 4px; line-height: 1;
}
.nav-box button:hover { background: #F1EFE8; }
.nav-box button:disabled { opacity: 0.3; cursor: default; }
#date-display { font-size: 14px; font-weight: 500; min-width: 96px; text-align: center; }
.card-white { background: #fff; border-radius: 12px; padding: 28px 32px 32px; }
.sec-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
.sec-sub { font-size: 14px; color: #5F5E5A; margin-bottom: 12px; }
.mc-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 14px; }
.mc { background: #F1EFE8; border-radius: 8px; padding: 12px 14px; }
.mc.a { background: #FAECE7; }
.mc-lbl { font-size: 14px; color: #5F5E5A; margin-bottom: 4px; }
.mc.a .mc-lbl { color: #993C1D; }
.mc-val { font-size: 22px; font-weight: 500; }
.mc.a .mc-val { color: #712B13; }
.legend { display: flex; gap: 14px; margin-bottom: 10px; font-size: 14px; color: #5F5E5A; align-items: center; flex-wrap: wrap; }
.li { display: flex; align-items: center; gap: 4px; }
.ll { width: 22px; height: 2px; background: #185FA5; display: inline-block; }
.ld { width: 20px; height: 0; border-top: 2px dashed #888780; display: inline-block; }
.ldo { width: 9px; height: 9px; border-radius: 50%; background: #C45A30; display: inline-block; }
.ls { width: 12px; height: 12px; background: #FAECE7; border: 0.5px solid #C45A30; display: inline-block; }
.lo { width: 12px; height: 12px; background: #C45A30; border-radius: 2px; display: inline-block; }
.lg { width: 12px; height: 12px; background: #B4B2A9; border-radius: 2px; display: inline-block; }
.cw { position: relative; width: 100%; }
.div { border: none; border-top: 0.5px solid #e8e6e0; margin: 24px 0; }

const dm={};

const all=RAW.map(r=>r[0]).sort();
const first=all[0], last=all[all.length-1];

const selM=document.getElementById('sel-m');
const selD=document.getElementById('sel-d');
const btnP=document.getElementById('btn-p');
const btnN=document.getElementById('btn-n');

const months=[...new Set(all.map(d=>d.slice(0,7)))].sort();
months.forEach(m=>{
  const [y,mo]=m.split('-');
  const o=document.createElement('option');
  o.value=m; o.textContent=`${y}年${parseInt(mo)}月`;
  selM.appendChild(o);
});

function daysOf(ym){return all.filter(d=>d.startsWith(ym)).map(d=>parseInt(d.slice(8)));}

function refreshDays(ym,cur){
  selD.innerHTML='';
  daysOf(ym).forEach(d=>{
    const o=document.createElement('option');
    o.value=String(d).padStart(2,'0'); o.textContent=`${d}日`;
    selD.appendChild(o);
  });
  const days=daysOf(ym);
  const t=cur||days[days.length-1];
  const cl=days.reduce((a,b)=>Math.abs(b-t)<Math.abs(a-t)?b:a);
  selD.value=String(cl).padStart(2,'0');
}

function curDate(){return `${selM.value}-${selD.value}`;}

function goDate(d){
  const ym=d.slice(0,7), dd=parseInt(d.slice(8));
  if(months.includes(ym)){selM.value=ym;refreshDays(ym,dd);selD.value=String(dd).padStart(2,'0');}
  render();
}

selM.value=last.slice(0,7);
refreshDays(last.slice(0,7),parseInt(last.slice(8)));
selD.value=last.slice(8);

selM.addEventListener('change',()=>{refreshDays(selM.value,null);render();});
selD.addEventListener('change',render);
btnP.addEventListener('click',()=>{const i=all.indexOf(curDate());if(i>0)goDate(all[i-1]);});
btnN.addEventListener('click',()=>{const i=all.indexOf(curDate());if(i<all.length-1)goDate(all[i+1]);});

const charts={};
function kill(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function avg(arr){return arr.reduce((s,v)=>s+v,0)/arr.length;}

  document.getElementById('c3l').textContent=`最高單日（${mxd}）`;
  document.getElementById('c3v').textContent=`${mx.toFixed(1)} 度`;
  const dl=dd.map(x=>x.slice(5).replace('-','/'));

    type:'line',
    data:{labels:dl,datasets:[
      {data:dv,borderWidth:2,segment:{borderColor:c=>c.p1.parsed.y>260?ORANGE:BLUE},
       pointRadius:dv.map(v=>v>260?4:2),pointBackgroundColor:dv.map(v=>v>260?ORANGE:BLUE),
       pointBorderColor:'transparent',backgroundColor:'rgba(55,138,221,0.07)',fill:true,tension:0.3},
      {data:Array(dd.length).fill(213),borderColor:GRAY,borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(1)+' 度'}}},
      scales:{
        x:{ticks:{color:LC,font:{size:13},maxRotation:45,autoSkip:false,
          callback:(v,i)=>{const x=dl[i],day=parseInt(x.slice(3));return(day===1||i===0||i===dl.length-1||day%7===0)?x:'';}},
          grid:{color:GC}},
        y:{min:150,max:Math.max(420,Math.ceil(mx/50)*50+40),
          ticks:{color:LC,callback:v=>v+' 度',font:{size:13}},grid:{color:GC}}
      }}
  });

  // ── 週線 ──
  const wm={};
  sub.forEach(ds=>{
    const dt=new Date(ds),dow=(dt.getDay()+6)%7;
    const mon=new Date(dt);mon.setDate(dt.getDate()-dow);
    const k=mon.toISOString().slice(0,10);
    (wm[k]=wm[k]||[]).push(dm[ds]);
  });
  const wk=Object.keys(wm).sort();
  const wl=wk.map((k,i)=>{
    const days=sub.filter(ds=>{const dt=new Date(ds),dow=(dt.getDay()+6)%7,mon=new Date(dt);mon.setDate(dt.getDate()-dow);return mon.toISOString().slice(0,10)===k;});
    const s=new Date(k),e=new Date(days[days.length-1]);
    const f=x=>`${x.getMonth()+1}/${x.getDate()}`;
    return wm[k].length===1?f(s):`${f(s)}–${f(e)}`;
  });
  const wv=wk.map(k=>Math.round(avg(wm[k])*10)/10);
  const ws=wk.map(k=>{const mo=parseInt(k.slice(5,7));return mo>=6&&mo<=9;});
  const si=ws.indexOf(true),ei2=ws.lastIndexOf(true);
  const wBg={id:'wBg',beforeDraw(ch){
    if(si<0)return;
    const{ctx,chartArea:ca,scales:sc}=ch;if(!ca)return;
    ctx.save();ctx.fillStyle=SBG;
    ctx.fillRect(sc.x.getPixelForValue(si),ca.top,sc.x.getPixelForValue(ei2)-sc.x.getPixelForValue(si),ca.height);
    ctx.restore();
  }};
  const wShow=new Set([0,wl.length-1]);
  if(si>=0){wShow.add(si);wShow.add(ei2);}
  ['6/2','9/29','10/27','12/1','1/5','3/2'].forEach(t=>{const x=wl.findIndex(l=>l.startsWith(t));if(x>=0)wShow.add(x);});
  kill('w');
  charts['w']=new Chart(document.getElementById('cW'),{
    type:'line',
    data:{labels:wl,datasets:[{data:wv,borderColor:BLUE,backgroundColor:'rgba(55,138,221,0.06)',
      borderWidth:1.5,pointRadius:wv.map((_,i)=>i===wl.length-1?6:2),
      pointBackgroundColor:wv.map((_,i)=>i===wl.length-1?ORANGE:BLUE),
      pointBorderColor:'transparent',fill:true,tension:0.3}]},
    plugins:[wBg],
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(1)+' 度/週均'}}},
      scales:{
        x:{ticks:{color:LC,font:{size:13},maxRotation:40,callback:(v,i)=>wShow.has(i)?wl[i]:''},grid:{color:GC}},
        y:{min:150,max:Math.max(420,Math.ceil(Math.max(...wv)/50)*50+30),
          ticks:{color:LC,callback:v=>v+' 度',font:{size:13}},grid:{color:GC}}
      }}
  });

  // ── 月線 ──
  const mm={};
  sub.forEach(ds=>{const ym=ds.slice(0,7);(mm[ym]=mm[ym]||[]).push(dm[ds]);});
  const mk=Object.keys(mm).sort();
  const ml=mk.map((ym,i)=>{const[y2,mo]=ym.split('-');return(i===0||mo==='01')?`${y2.slice(2)}/${parseInt(mo)}月`:`${parseInt(mo)}月`;});
  const mv=mk.map(ym=>Math.round(avg(mm[ym])*10)/10);
  const ms=mk.map(ym=>{const mo=parseInt(ym.slice(5));return mo>=6&&mo<=9;});
  const msi=ms.indexOf(true),mei=ms.lastIndexOf(true);
  const lastMk=mk[mk.length-1],lastDays=mm[lastMk].length;
  const isInc=lastDays<28;
  const[ly2,lmo]=lastMk.split('-');
  document.getElementById('m-sub').textContent=isInc
    ?`${ly2}年${parseInt(lmo)}月為截至${end.slice(8)}日之${lastDays}天平均`:'各月完整平均';
  const mBg={id:'mBg',beforeDraw(ch){
    if(msi<0)return;
    const{ctx,chartArea:ca,scales:sc}=ch;if(!ca)return;
    ctx.save();ctx.fillStyle=SBG;
    ctx.fillRect(sc.x.getPixelForValue(msi)-0.5,ca.top,sc.x.getPixelForValue(mei)-sc.x.getPixelForValue(msi)+1,ca.height);
    ctx.restore();
  }};
  kill('m');
  charts['m']=new Chart(document.getElementById('cM'),{
    type:'bar',
    data:{labels:ml,datasets:[{data:mv.map(v=>v-150),backgroundColor:ms.map(s=>s?ORANGE:GRAY),
      base:0,borderRadius:3,borderSkipped:false}]},
    plugins:[mBg],
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
        const real=(c.parsed.y+150).toFixed(1);
        const note=mm[mk[c.dataIndex]].length<28?` (${mm[mk[c.dataIndex]].length}天)`:'';
        return `${real} 度/月均${note}`;
      }}}},
      scales:{
        x:{ticks:{color:LC,font:{size:13}},grid:{display:false}},
        y:{min:0,max:Math.max(270,Math.ceil(Math.max(...mv.map(v=>v-150))/50)*50+20),
          ticks:{color:LC,callback:v=>(v+150)+' 度',font:{size:13}},grid:{color:GC}}
      }}
  });
}
render();
</script>
</body>
</html>
